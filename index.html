            '<div class="problem-solution-content">' + prob.solution + '</div>' +
          '</div>' +
        '</div>' +
      '</div>'
    ).join('');

    const chipsHTML = (pset.topics || []).map(t => '<span class="topic-chip">' + t + '</span>').join('');

    const article = document.createElement('article');
    article.className = 'pset-post';
    article.id = 'pset-post-' + pset.id;

    article.innerHTML =
      '<button class="pset-header" aria-expanded="false" aria-controls="pset-body-' + pset.id + '" id="pset-header-' + pset.id + '" data-hud-label="PS ' + pset.number + ' \u2014 ' + pset.title + '">' +
        '<span class="pset-number">PS ' + pset.number + '</span>' +
        '<span class="pset-titleblock">' +
          '<span class="pset-title">' + pset.title + '</span>' +
          '<span class="pset-meta">' +
            '<span>Assigned ' + formatDate(pset.assignedDate) + '</span>' +
            '<span class="due-pill">Due ' + formatDate(pset.dueDate) + '</span>' +
            '<span>' + totalPoints(pset) + ' pts total</span>' +
          '</span>' +
          '<span class="pset-summary">' + pset.summary + '</span>' +
          (chipsHTML ? '<span class="topic-chips">' + chipsHTML + '</span>' : '') +
        '</span>' +
        PSET_CHEVRON_SVG +
      '</button>' +
      '<span class="post-actions">' +
        '<button type="button" class="post-action-btn share-btn" aria-label="Copy link to this problem set">' + LINK_ICON_SVG + '</button>' +
        '<button type="button" class="post-action-btn maximize-btn" aria-label="Maximize this problem set" aria-pressed="false">' + MAXIMIZE_ICON_SVG + '</button>' +
      '</span>' +
      '<div class="pset-body" id="pset-body-' + pset.id + '" role="region" aria-labelledby="pset-header-' + pset.id + '">' +
        '<div class="pset-body-inner">' +
          '<div class="pset-content">' + pset.bodyHTML + problemsHTML + '</div>' +
        '</div>' +
      '</div>';

    feedEl.appendChild(article);

    article.querySelector('.pset-header').addEventListener('click', () => {
      if (article.classList.contains('is-maximized')) return; // stays open while maximized
      setPsetExpanded(pset, !article.classList.contains('expanded'));
    });
    wireMaximizeButton(article, article.querySelector('.maximize-btn'), () => setPsetExpanded(pset, true));
    wireShareButton(article.querySelector('.share-btn'), 'pset', pset.id);

    if (isExpanded) setPsetExpanded(pset, true, { persist: false });
  });
}

// Deep links: page.html#pset-ps2 expands that set and scrolls to it.
// Mirrors openFromHash above; same true/false contract for the router.
function openPsetFromHash() {
  const m = location.hash.match(/^#pset-(.+)$/);
  if (!m) return false;
  const pset = PROBLEM_SETS.find(p => p.id === m[1]);
  if (!pset) return false;
  activateTab('psets', { persist: false });
  setPsetExpanded(pset, true);
  requestAnimationFrame(() => {
    const article = document.getElementById('pset-post-' + pset.id);
    if (article) article.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  return true;
}


/* ============================================================================
   POST MAXIMIZE — fullscreen a single lecture or problem set, like
   maximizing a window. One shared implementation for both post types,
   since the behavior itself (not the content shape) is identical; each
   render function just passes in its own "make sure this post is
   expanded" callback.
   ============================================================================ */

const MAXIMIZE_ICON_SVG =
  '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true">' +
    '<path d="M4 8V4h4M16 8V4h-4M4 12v4h4M16 12v4h-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>' +
  '</svg>';

const RESTORE_ICON_SVG =
  '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true">' +
    '<path d="M8 4v4H4M12 4v4h4M8 16v-4H4M12 16v-4h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>' +
  '</svg>';

function setMaximized(article, btn, ensureExpanded, maximized) {
  article.classList.toggle('is-maximized', maximized);
  btn.setAttribute('aria-pressed', String(maximized));
  btn.setAttribute('aria-label', maximized ? 'Restore this post' : 'Maximize this post');
  btn.innerHTML = maximized ? RESTORE_ICON_SVG : MAXIMIZE_ICON_SVG;
  document.body.classList.toggle('scroll-locked', maximized);
  if (maximized) {
    ensureExpanded();
    requestAnimationFrame(() => btn.focus());
  }
}

// Finds whichever post (if any) is currently maximized and restores it.
// Used as a safety net before maximizing a different post (not normally
// reachable, since a maximized post visually covers every other control)
// and by the Escape key / hash router, so navigating away never leaves a
// fullscreen post stranded over the page.
function restoreAnyMaximized() {
  const el = document.querySelector('.lecture-post.is-maximized, .pset-post.is-maximized');
  if (!el) return;
  const btn = el.querySelector('.maximize-btn');
  if (btn) { setMaximized(el, btn, () => {}, false); return; }
  el.classList.remove('is-maximized');
  document.body.classList.remove('scroll-locked');
}

function wireMaximizeButton(article, btn, ensureExpanded) {
  if (!btn || btn.dataset.wired) return;
  btn.dataset.wired = '1';
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const goingIn = !article.classList.contains('is-maximized');
    if (goingIn) restoreAnyMaximized();
    setMaximized(article, btn, ensureExpanded, goingIn);
  });
}


/* ============================================================================
   SHARE LINK — a corner button that copies a deep link to one lecture or
   problem set. Always updates the address bar (so the link is correct
   even if clipboard access is unavailable) and best-effort copies it too.
   ============================================================================ */

const LINK_ICON_SVG =
  '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true">' +
    '<path d="M8 3H3v14h14v-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<path d="M9 11L17 3M11 3h6v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>' +
  '</svg>';

const CHECK_ICON_SVG =
  '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true">' +
    '<path d="M4 10.5L8 14.5L16 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
  '</svg>';

function wireShareButton(btn, kind, id) {
  if (!btn || btn.dataset.wired) return;
  btn.dataset.wired = '1';
  const hashPrefix = kind === 'pset' ? '#pset-' : '#post-';
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const url = location.origin + location.pathname + hashPrefix + id;
    location.hash = hashPrefix + id; // guaranteed correct even if clipboard access fails below
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).catch(() => {});
    }
    if (btn.dataset.confirming) return;
    btn.dataset.confirming = '1';
    const original = btn.innerHTML;
    const originalLabel = btn.getAttribute('aria-label');
    btn.innerHTML = CHECK_ICON_SVG;
    btn.setAttribute('aria-label', 'Link copied');
    setTimeout(() => {
      btn.innerHTML = original;
      btn.setAttribute('aria-label', originalLabel);
      delete btn.dataset.confirming;
    }, 1600);
  });
}


/* ============================================================================
   FOOTNOTES — inline citation markers, click to open a popover in place
   (no jump to the bottom of a possibly-long or collapsed post), plus a
   numbered reference list appended once at the end of the post's content.
   Author syntax: <sup class="fnref" data-fn="1"></sup> in bodyHTML/prompt/
   solution, matched against that post's own `footnotes` array (1-indexed).
   ============================================================================ */

let openFnBtn = null;

const footnotePopoverEl = document.createElement('div');
footnotePopoverEl.className = 'footnote-popover';
footnotePopoverEl.setAttribute('role', 'tooltip');
document.body.appendChild(footnotePopoverEl);

function closeFootnotePopover() {
  if (!openFnBtn) return;
  footnotePopoverEl.classList.remove('is-open');
  openFnBtn.setAttribute('aria-expanded', 'false');
  openFnBtn = null;
}

function positionFootnotePopover(btn) {
  const rect = btn.getBoundingClientRect();
  const popRect = footnotePopoverEl.getBoundingClientRect();
  const margin = 12;
  let left = rect.left;
  let top = rect.bottom + 6;
  left = Math.min(left, window.innerWidth - popRect.width - margin);
  left = Math.max(margin, left);
  if (top + popRect.height > window.innerHeight - margin) {
    top = rect.top - popRect.height - 6;
  }
  footnotePopoverEl.style.left = left + 'px';
  footnotePopoverEl.style.top = Math.max(margin, top) + 'px';
}

function openFootnotePopover(btn, html) {
  footnotePopoverEl.innerHTML = '<span class="fn-num">' + btn.textContent + '</span>' + html;
  footnotePopoverEl.classList.add('is-open');
  btn.setAttribute('aria-expanded', 'true');
  openFnBtn = btn;
  positionFootnotePopover(btn);
}

// Wires each footnote marker exactly once (lazy, on first expand — mirrors
// mountSimsIn/wireProblemToggles), then appends one combined reference
// list covering every marker used anywhere in the post.
function wireFootnotes(article, footnotesArr) {
  if (!footnotesArr || !footnotesArr.length) return;
  const refs = article.querySelectorAll('.fnref[data-fn]');
  const usedNums = new Set();

  refs.forEach((btn) => {
    const n = Number(btn.dataset.fn);
    const text = footnotesArr[n - 1];
    if (text === undefined) {
      console.warn('Footnote index ' + n + ' has no matching entry in "' + article.id + '"');
      btn.textContent = '[?]';
      return;
    }
    usedNums.add(n);
    if (btn.dataset.wired) return;
    btn.dataset.wired = '1';
    btn.textContent = '[' + n + ']';
    btn.setAttribute('aria-haspopup', 'true');
    btn.setAttribute('aria-expanded', 'false');
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (openFnBtn === btn) { closeFootnotePopover(); return; }
      openFootnotePopover(btn, text);
    });
  });

  const contentEl = article.querySelector('.lecture-content, .pset-content');
  if (contentEl && usedNums.size && !contentEl.querySelector('.footnotes-list')) {
    const ol = document.createElement('ol');
    ol.className = 'footnotes-list';
    [...usedNums].sort((a, b) => a - b).forEach((n) => {
      const li = document.createElement('li');
      li.innerHTML = footnotesArr[n - 1];
      ol.appendChild(li);
    });
    contentEl.appendChild(ol);
  }
}

// Dismiss the open popover on outside click, Escape, scroll, or resize —
// its position is computed once at open time, so anything that could move
// the marker or change the viewport should close it rather than drift.
document.addEventListener('click', (e) => {
  if (!openFnBtn) return;
  if (e.target === openFnBtn || footnotePopoverEl.contains(e.target)) return;
  closeFootnotePopover();
});
document.addEventListener('scroll', closeFootnotePopover, true);
window.addEventListener('resize', closeFootnotePopover);
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  closeFootnotePopover();
  restoreAnyMaximized();
});


/* ============================================================================
   SIMULATOR 1 — SUPPLY & DEMAND
   Welfare accounting uses the general integral forms
     CS = ∫₀^q (a − bQ) dQ − p_c·q,   PS = p_p·q − ∫₀^q (c + dQ) dQ,
   which reduce to the familiar triangles when q lies on the relevant curve
   but stay correct when a binding price control pushes q off-curve.
   ============================================================================ */

function mountSupplyDemand(container, config = {}) {
  const state = {
    demandIntercept: config.demandIntercept ?? 100,
    demandSlope: config.demandSlope ?? 1,
    supplyIntercept: config.supplyIntercept ?? 10,
    supplySlope: config.supplySlope ?? 1,
    demandShift: 0,
    supplyShift: 0,
    tax: 0,
    controlMode: 'none',   // 'none' | 'ceiling' | 'floor'
    controlPrice: 50,
  };

  const root = document.createElement('div');
  root.className = 'sim-root';
  root.innerHTML =
    '<div class="sim-controls">' +
      '<label class="sim-control">' +
        '<span class="sim-label-row">Demand shift <span class="sim-value" data-role="v-dshift">+0</span></span>' +
        '<input type="range" data-role="in-dshift" min="-30" max="30" step="1" value="0">' +
      '</label>' +
      '<label class="sim-control">' +
        '<span class="sim-label-row">Supply shift <span class="sim-value" data-role="v-sshift">+0</span></span>' +
        '<input type="range" data-role="in-sshift" min="-30" max="30" step="1" value="0">' +
      '</label>' +
      '<label class="sim-control">' +
        '<span class="sim-label-row">Per-unit tax <span class="sim-value" data-role="v-tax">$0.00</span></span>' +
        '<input type="range" data-role="in-tax" min="0" max="30" step="1" value="0">' +
      '</label>' +
      '<div class="sim-control" style="flex-basis:100%;">' +
        '<span class="sim-label-row">Price control</span>' +
        '<div class="sim-toggle-group" role="group" aria-label="Price control type">' +
          '<button type="button" class="sim-toggle-btn active" data-mode="none">None</button>' +
          '<button type="button" class="sim-toggle-btn" data-mode="ceiling">Price ceiling</button>' +
          '<button type="button" class="sim-toggle-btn" data-mode="floor">Price floor</button>' +
        '</div>' +
      '</div>' +
      '<label class="sim-control" data-role="control-price-wrap" style="display:none;">' +
        '<span class="sim-label-row">Controlled price <span class="sim-value" data-role="v-controlprice">$50.00</span></span>' +
        '<input type="range" data-role="in-controlprice" min="0" max="100" step="1" value="50">' +
      '</label>' +
    '</div>' +
    '<div class="sim-layout">' +
      '<div class="sim-svg-wrap" data-role="chart"></div>' +
      '<div class="sim-readouts" data-role="readouts"></div>' +
    '</div>' +
    '<div data-role="legend"></div>';
  container.appendChild(root);

  const el = (sel) => root.querySelector(sel);
  const dShiftInput = el('[data-role="in-dshift"]');
  const sShiftInput = el('[data-role="in-sshift"]');
  const taxInput = el('[data-role="in-tax"]');
  const controlPriceWrap = el('[data-role="control-price-wrap"]');
  const controlPriceInput = el('[data-role="in-controlprice"]');
  const chartWrap = el('[data-role="chart"]');
  const readoutsWrap = el('[data-role="readouts"]');
  const legendWrap = el('[data-role="legend"]');
  const toggleBtns = root.querySelectorAll('.sim-toggle-btn');

  function computeAndRender() {
    const a = state.demandIntercept + state.demandShift;
    const b = state.demandSlope;
    const c = state.supplyIntercept + state.supplyShift;
    const d = state.supplySlope;
    const t = state.tax;

    const free = Econ.equilibrium(a, b, c, d);

    let qT, pC, pP, mode = 'free', qd = null, qs = null;

    if (state.controlMode === 'ceiling' && state.controlPrice < free.p) {
      mode = 'ceiling';
      qd = Math.max(0, Econ.qFromDemand(a, b, state.controlPrice));
      qs = Math.max(0, Econ.qFromSupply(c, d, state.controlPrice));
      qT = Math.min(qd, qs);              // short-side rule
      pC = pP = state.controlPrice;
    } else if (state.controlMode === 'floor' && state.controlPrice > free.p) {
      mode = 'floor';
      qd = Math.max(0, Econ.qFromDemand(a, b, state.controlPrice));
      qs = Math.max(0, Econ.qFromSupply(c, d, state.controlPrice));
      qT = Math.min(qd, qs);              // short-side rule
      pC = pP = state.controlPrice;
    } else if (t > 0) {
      mode = 'tax';                       // solve a − bQ = c + dQ + t
      qT = Math.max(0, (a - c - t) / (b + d));
      pC = a - b * qT;
      pP = pC - t;
    } else {
      qT = free.q; pC = free.p; pP = free.p;
    }

    const PdT = a - b * qT;               // demand price at the transacted quantity
    const PsT = c + d * qT;               // supply price at the transacted quantity

    const cs = Math.max(0, a * qT - 0.5 * b * qT * qT - pC * qT);
    const ps = Math.max(0, pP * qT - c * qT - 0.5 * d * qT * qT);
    const dwl = (free.q - qT) > 1e-9 ? 0.5 * (PdT - PsT) * (free.q - qT) : 0;
    const taxRevenue = mode === 'tax' ? t * qT : 0;

    renderReadouts({ mode, qT, pC, pP, cs, ps, dwl, taxRevenue, qd, qs });
    renderChart({ a, b, c, d, t, free, qT, pC, pP, PdT, PsT, mode, qd, qs });
  }

  function renderReadouts({ mode, qT, pC, pP, cs, ps, dwl, taxRevenue, qd, qs }) {
    readoutsWrap.innerHTML = '';
    const priceLabel = mode === 'tax' ? 'Price (buyer / seller)' :
                       mode === 'free' ? 'Equilibrium price P*' : 'Controlled price';
    const priceValue = mode === 'tax' ? Fmt.price(pC) + ' / ' + Fmt.price(pP) : Fmt.price(pC);
    readoutsWrap.appendChild(buildReadoutCard({ label: priceLabel, value: priceValue, accent: 'slate' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Quantity traded', value: Fmt.qty(qT), accent: 'slate' }));
    if (mode === 'ceiling' || mode === 'floor') {
      readoutsWrap.appendChild(buildReadoutCard({ label: 'Qd / Qs at that price', value: Fmt.qty(qd) + ' / ' + Fmt.qty(qs) }));
    }
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Consumer surplus', value: Fmt.price(cs), accent: 'sage' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Producer surplus', value: Fmt.price(ps), accent: 'umber' }));
    if (dwl > 0.005) {
      readoutsWrap.appendChild(buildReadoutCard({ label: 'Deadweight loss', value: Fmt.price(dwl), accent: 'red' }));
    }
    if (taxRevenue > 0) {
      readoutsWrap.appendChild(buildReadoutCard({ label: 'Tax revenue', value: Fmt.price(taxRevenue) }));
    }
  }

  function renderChart({ a, b, c, d, t, free, qT, pC, pP, PdT, PsT, mode, qd, qs }) {
    const xMax = Math.max(free.q, qT, qd || 0, qs || 0) * 1.55 + 5;
    const yMax = Math.max(a, pC) * 1.08;

    const chart = buildChart({ width: 640, height: 400, xMax, yMax, xLabel: 'Quantity (Q)', yLabel: 'Price (P)' });
    chartWrap.innerHTML = '';
    chartWrap.appendChild(chart.svg);
    const { plot, overlay, xScale, yScale } = chart;

    // Surplus shading first, so curves draw on top.
    if (qT > 0.01) {
      // CS: region between demand curve and the buyer price, 0..qT.
      // Trapezoid in general; collapses to the familiar triangle when qT is on demand.
      plot.appendChild(shade([
        [xScale(0), yScale(a)],
        [xScale(qT), yScale(PdT)],
        [xScale(qT), yScale(pC)],
        [xScale(0), yScale(pC)],
      ], C.cs, 0.3));

      // PS: region between the seller price and the supply curve, 0..qT.
      plot.appendChild(shade([
        [xScale(0), yScale(c)],
        [xScale(qT), yScale(PsT)],
        [xScale(qT), yScale(pP)],
        [xScale(0), yScale(pP)],
      ], C.supply, 0.26));
    }

    // DWL: full wedge between demand and supply from qT to the free equilibrium.
    if (free.q - qT > 0.01) {
      plot.appendChild(shade([
        [xScale(qT), yScale(PdT)],
        [xScale(qT), yScale(PsT)],
        [xScale(free.q), yScale(free.p)],
      ], C.dwl, 0.34));
    }

    // Demand and supply curves (clipped, so raw intercepts are fine).
    plot.appendChild(strokeLine(xScale(0), yScale(a), xScale(a / b), yScale(0), C.demand, 2.25));
    plot.appendChild(strokeLine(xScale(0), yScale(c), xScale(xMax), yScale(c + d * xMax), C.supply, 2.25));

    // Post-tax supply, dashed.
    if (mode === 'tax') {
      plot.appendChild(strokeLine(xScale(0), yScale(c + t), xScale(xMax), yScale(c + t + d * xMax), C.supply, 1.6, '5,4'));
    }

    // Binding price control: horizontal line across the plot.
    if (mode === 'ceiling' || mode === 'floor') {
      plot.appendChild(strokeLine(xScale(0), yScale(pC), xScale(xMax), yScale(pC), C.ink, 1.4, '2,3'));
      const gapLabel = mode === 'ceiling'
        ? 'shortage: Qd − Qs = ' + Fmt.qty(qd - qs)
        : 'surplus: Qs − Qd = ' + Fmt.qty(qs - qd);
      overlay.appendChild(svgText(gapLabel, {
        x: xScale(qT) + 8, y: yScale(pC) - 8, style: TXT.mono(C.dwl).replace('10.5px', '10px'),
      }));
    }

    // Construction line at the transacted quantity.
    plot.appendChild(strokeLine(xScale(qT), yScale(0), xScale(qT), yScale(Math.max(PdT, pC)), C.faint, 1, '3,3'));

    // Markers.
    overlay.appendChild(marker(xScale(qT), yScale(pC), C.ink));
    if (Math.abs(pC - pP) > 0.01) overlay.appendChild(marker(xScale(qT), yScale(pP), C.ink));

    // Curve labels.
    const qD0 = Math.min(a / b, xMax * 0.97);
    overlay.appendChild(svgText('D', {
      x: xScale(qD0) + 6, y: yScale(Math.max(a - b * qD0, 0)) + 4, style: TXT.label(C.demand),
    }));
    overlay.appendChild(svgText('S', {
      x: xScale(xMax) - 16, y: yScale(Math.min(c + d * xMax, yMax)) - 6, style: TXT.label(C.supply),
    }));

    legendWrap.innerHTML = '';
    legendWrap.appendChild(buildLegend([
      { type: 'line', color: C.demand, label: 'Demand' },
      { type: 'line', color: C.supply, label: 'Supply' + (mode === 'tax' ? ' (dashed = post-tax)' : '') },
      { type: 'swatch', color: C.cs, label: 'Consumer surplus' },
      { type: 'swatch', color: C.supply, label: 'Producer surplus' },
      { type: 'swatch', color: C.dwl, label: 'Deadweight loss' },
    ]));
  }

  dShiftInput.addEventListener('input', (e) => {
    state.demandShift = Number(e.target.value);
    el('[data-role="v-dshift"]').textContent = (state.demandShift >= 0 ? '+' : '') + state.demandShift;
    computeAndRender();
  });
  sShiftInput.addEventListener('input', (e) => {
    state.supplyShift = Number(e.target.value);
    el('[data-role="v-sshift"]').textContent = (state.supplyShift >= 0 ? '+' : '') + state.supplyShift;
    computeAndRender();
  });
  taxInput.addEventListener('input', (e) => {
    state.tax = Number(e.target.value);
    el('[data-role="v-tax"]').textContent = Fmt.price(state.tax);
    if (state.tax > 0 && state.controlMode !== 'none') {
      state.controlMode = 'none';
      toggleBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === 'none'));
      controlPriceWrap.style.display = 'none';
    }
    computeAndRender();
  });
  controlPriceInput.addEventListener('input', (e) => {
    state.controlPrice = Number(e.target.value);
    el('[data-role="v-controlprice"]').textContent = Fmt.price(state.controlPrice);
    computeAndRender();
  });
  toggleBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      state.controlMode = btn.dataset.mode;
      toggleBtns.forEach(other => other.classList.toggle('active', other === btn));
      controlPriceWrap.style.display = state.controlMode === 'none' ? 'none' : '';
      if (state.controlMode !== 'none' && state.tax > 0) {
        state.tax = 0;
        taxInput.value = 0;
        el('[data-role="v-tax"]').textContent = '$0.00';
      }
      computeAndRender();
    });
  });

  computeAndRender();
}


/* ============================================================================
   SIMULATOR 2 — MONOPOLY & DEADWEIGHT LOSS
   ============================================================================ */

function mountMonopoly(container, config = {}) {
  const state = {
    demandIntercept: config.demandIntercept ?? 100,
    demandSlope: config.demandSlope ?? 1,
    mc: config.mc ?? 20,
  };

  const root = document.createElement('div');
  root.className = 'sim-root';
  root.innerHTML =
    '<div class="sim-controls">' +
      '<label class="sim-control">' +
        '<span class="sim-label-row">Marginal cost (MC) <span class="sim-value" data-role="v-mc">' + Fmt.price(state.mc) + '</span></span>' +
        '<input type="range" data-role="in-mc" min="0" max="80" step="1" value="' + state.mc + '">' +
      '</label>' +
    '</div>' +
    '<div class="sim-layout">' +
      '<div class="sim-svg-wrap" data-role="chart"></div>' +
      '<div class="sim-readouts" data-role="readouts"></div>' +
    '</div>' +
    '<div data-role="legend"></div>';
  container.appendChild(root);

  const el = (sel) => root.querySelector(sel);
  const mcInput = el('[data-role="in-mc"]');
  const chartWrap = el('[data-role="chart"]');
  const readoutsWrap = el('[data-role="readouts"]');
  const legendWrap = el('[data-role="legend"]');

  function computeAndRender() {
    const a = state.demandIntercept, b = state.demandSlope, mc = state.mc;

    const mono = Econ.monopolyOutcome(a, b, mc);
    const comp = { q: Math.max(0, (a - mc) / b), p: mc };
    const lerner = Econ.lernerIndex(mono.p, mc);
    const markup = mono.p - mc;
    const dwl = 0.5 * (comp.q - mono.q) * (mono.p - mc);
    const profit = mono.q * (mono.p - mc);   // = producer surplus (constant MC)
    const csMono = Econ.consumerSurplus(a, mono.p, mono.q);

    renderReadouts({ mono, comp, lerner, markup, dwl, profit, csMono });
    renderChart({ a, b, mc, mono, comp });
  }

  function renderReadouts({ mono, comp, lerner, markup, dwl, profit, csMono }) {
    readoutsWrap.innerHTML = '';
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Monopoly price Pm', value: Fmt.price(mono.p), accent: 'slate' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Monopoly quantity Qm', value: Fmt.qty(mono.q), accent: 'slate' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Competitive P / Q', value: Fmt.price(comp.p) + ' / ' + Fmt.qty(comp.q) }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Markup (Pm − MC)', value: Fmt.price(markup), accent: 'umber' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Lerner index', value: Fmt.pct(lerner), accent: 'umber' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Monopoly profit', value: Fmt.price(profit), accent: 'umber' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Consumer surplus', value: Fmt.price(csMono), accent: 'sage' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Deadweight loss', value: Fmt.price(dwl), accent: 'red' }));
  }

  function renderChart({ a, b, mc, mono, comp }) {
    const xMax = Math.max(comp.q, 1) * 1.25 + 5;
    const yMax = a * 1.05;

    const chart = buildChart({ width: 640, height: 400, xMax, yMax, xLabel: 'Quantity (Q)', yLabel: 'Price / Cost (P)' });
    chartWrap.innerHTML = '';
    chartWrap.appendChild(chart.svg);
    const { plot, overlay, xScale, yScale } = chart;

    // Shading.
    if (mono.q > 0.01) {
      plot.appendChild(shade([
        [xScale(0), yScale(a)], [xScale(mono.q), yScale(mono.p)], [xScale(0), yScale(mono.p)],
      ], C.cs, 0.24));
      plot.appendChild(shade([
        [xScale(0), yScale(mono.p)], [xScale(mono.q), yScale(mono.p)],
        [xScale(mono.q), yScale(mc)], [xScale(0), yScale(mc)],
      ], C.supply, 0.22));
      plot.appendChild(shade([
        [xScale(mono.q), yScale(mono.p)], [xScale(mono.q), yScale(mc)], [xScale(comp.q), yScale(mc)],
      ], C.dwl, 0.34));
    }

    // Demand (slate, solid) and MR (slate, dashed — it is derived from demand).
    plot.appendChild(strokeLine(xScale(0), yScale(a), xScale(a / b), yScale(0), C.demand, 2.25));
    plot.appendChild(strokeLine(xScale(0), yScale(a), xScale(a / (2 * b)), yScale(0), C.demand, 1.8, '6,4'));
    // MC (umber, horizontal).
    plot.appendChild(strokeLine(xScale(0), yScale(mc), xScale(xMax), yScale(mc), C.supply, 2));

    // Construction lines.
    plot.appendChild(strokeLine(xScale(mono.q), yScale(0), xScale(mono.q), yScale(mono.p), C.faint, 1, '3,3'));
    plot.appendChild(strokeLine(xScale(comp.q), yScale(0), xScale(comp.q), yScale(mc), C.faint, 1, '3,3'));

    // Markers.
    overlay.appendChild(marker(xScale(mono.q), yScale(mono.p), C.ink));
    overlay.appendChild(marker(xScale(comp.q), yScale(mc), C.ink));

    // Labels.
    const qD0 = Math.min(a / b, xMax * 0.97);
    overlay.appendChild(svgText('D', {
      x: xScale(qD0) - 2, y: yScale(Math.max(a - b * qD0, 0)) - 8, style: TXT.label(C.demand),
    }));
    overlay.appendChild(svgText('MR', {
      x: xScale(Math.min(a / (2 * b), xMax * 0.9)) + 4, y: yScale(0) - 8, style: TXT.label(C.demand),
    }));
    overlay.appendChild(svgText('MC', {
      x: xScale(xMax) - 26, y: yScale(mc) - 6, style: TXT.label(C.supply),
    }));

    legendWrap.innerHTML = '';
    legendWrap.appendChild(buildLegend([
      { type: 'line', color: C.demand, label: 'Demand (solid) · MR (dashed)' },
      { type: 'line', color: C.supply, label: 'Marginal cost' },
      { type: 'swatch', color: C.cs, label: 'Consumer surplus' },
      { type: 'swatch', color: C.supply, label: 'Monopoly profit' },
      { type: 'swatch', color: C.dwl, label: 'Deadweight loss' },
    ]));
  }

  mcInput.addEventListener('input', (e) => {
    state.mc = Number(e.target.value);
    el('[data-role="v-mc"]').textContent = Fmt.price(state.mc);
    computeAndRender();
  });

  computeAndRender();
}


/* ============================================================================
   SIMULATOR 3 — COURNOT / BERTRAND OLIGOPOLY
   ============================================================================ */

function mountCournot(container, config = {}) {
  const state = {
    demandIntercept: config.demandIntercept ?? 100,
    demandSlope: config.demandSlope ?? 1,
    mc: config.mc ?? 20,
    firms: config.firms ?? 2,
    mode: config.mode ?? 'cournot',
  };

  const root = document.createElement('div');
  root.className = 'sim-root';
  root.innerHTML =
    '<div class="sim-controls">' +
      '<div class="sim-control" style="flex-basis:100%;">' +
        '<span class="sim-label-row">Competition mode</span>' +
        '<div class="sim-toggle-group" role="group" aria-label="Competition mode">' +
          '<button type="button" class="sim-toggle-btn' + (state.mode === 'cournot' ? ' active' : '') + '" data-mode="cournot">Cournot (quantity)</button>' +
          '<button type="button" class="sim-toggle-btn' + (state.mode === 'bertrand' ? ' active' : '') + '" data-mode="bertrand">Bertrand (price)</button>' +
        '</div>' +
      '</div>' +
      '<label class="sim-control">' +
        '<span class="sim-label-row">Number of firms (n) <span class="sim-value" data-role="v-firms">' + state.firms + '</span></span>' +
        '<input type="range" data-role="in-firms" min="2" max="5" step="1" value="' + state.firms + '">' +
      '</label>' +
      '<label class="sim-control">' +
        '<span class="sim-label-row">Marginal cost <span class="sim-value" data-role="v-mc">' + Fmt.price(state.mc) + '</span></span>' +
        '<input type="range" data-role="in-mc" min="0" max="80" step="1" value="' + state.mc + '">' +
      '</label>' +
    '</div>' +
    '<div class="sim-layout">' +
      '<div class="sim-svg-wrap" data-role="chart"></div>' +
      '<div class="sim-readouts" data-role="readouts"></div>' +
    '</div>' +
    '<div data-role="legend"></div>';
  container.appendChild(root);

  const el = (sel) => root.querySelector(sel);
  const firmsInput = el('[data-role="in-firms"]');
  const mcInput = el('[data-role="in-mc"]');
  const chartWrap = el('[data-role="chart"]');
  const readoutsWrap = el('[data-role="readouts"]');
  const legendWrap = el('[data-role="legend"]');
  const modeBtns = root.querySelectorAll('.sim-toggle-btn');

  function computeAndRender() {
    const a = state.demandIntercept, b = state.demandSlope, mc = state.mc, n = state.firms;
    if (state.mode === 'cournot') {
      const result = Econ.cournotEquilibrium(a, b, mc, n);
      renderReadoutsCournot({ a, mc, n, result });
      renderCournotChart({ a, b, mc, n, result });
    } else {
      const result = Econ.bertrandEquilibrium(a, b, mc);
      renderReadoutsBertrand({ result, n });
      renderBertrandChart({ a, b, mc, n });
    }
  }

  function renderReadoutsCournot({ a, mc, n, result }) {
    readoutsWrap.innerHTML = '';
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Equilibrium price', value: Fmt.price(result.p), accent: 'slate' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Quantity per firm', value: Fmt.qty(result.qEach), accent: 'slate' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Total industry Q', value: Fmt.qty(result.qTotal) }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Profit per firm', value: Fmt.price(result.profitEach), accent: 'umber' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Industry profit', value: Fmt.price(result.profitEach * n), accent: 'umber' }));
    readoutsWrap.appendChild(buildReadoutCard({
      label: 'P: monopoly / competitive',
      value: Fmt.price((a + mc) / 2) + ' / ' + Fmt.price(mc),
    }));
  }

  function renderReadoutsBertrand({ result, n }) {
    readoutsWrap.innerHTML = '';
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Equilibrium price (= MC)', value: Fmt.price(result.p), accent: 'slate' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Total industry Q', value: Fmt.qty(result.qTotal), accent: 'slate' }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Quantity per firm', value: Fmt.qty(result.qTotal / n) }));
    readoutsWrap.appendChild(buildReadoutCard({ label: 'Profit per firm', value: Fmt.price(result.profitEach), accent: 'umber' }));
  }

  // Best-response diagram. For n = 2, the classic crossing of R₁ and R₂ in
  // (q₂, q₁) space. For n > 2, firm i's best response against rivals' total
  // output, with the symmetric-output ray qᵢ = Q₋ᵢ/(n−1) through equilibrium.
  function renderCournotChart({ a, b, mc, n, result }) {
    const reach = (a - mc) / b;                 // largest relevant quantity
    const totalMax = reach * 1.05;
    const xLab = n === 2 ? "Firm 2's quantity (q\u2082)" : "Rivals' total quantity (Q\u208B\u1D62)";
    const yLab = n === 2 ? "Firm 1's quantity (q\u2081)" : "Firm i's quantity (q\u1D62)";

    const chart = buildChart({ width: 640, height: 400, xMax: totalMax, yMax: totalMax, xLabel: xLab, yLabel: yLab });
    chartWrap.innerHTML = '';
    chartWrap.appendChild(chart.svg);
    const { plot, overlay, xScale, yScale } = chart;

    // Firm i's best response (linear): from (0, (a−mc)/2b) to ((a−mc)/b, 0).
    plot.appendChild(strokeLine(xScale(0), yScale(reach / 2), xScale(reach), yScale(0), C.demand, 2.25));

    // For n = 2, firm 2's best response is the mirror across the 45° line.
    if (n === 2) {
      plot.appendChild(strokeLine(xScale(reach / 2), yScale(0), xScale(0), yScale(reach), C.supply, 2.25));
    }

    // Symmetric-output ray: qᵢ = Q₋ᵢ / (n−1). For n = 2 this is the 45° line.
    plot.appendChild(strokeLine(xScale(0), yScale(0), xScale(totalMax), yScale(totalMax / (n - 1)), C.ruleStrong, 1, '2,3'));

    // Equilibrium: rivals' total on x, own quantity on y.
    const eqX = (n - 1) * result.qEach;
    const eqY = result.qEach;
    plot.appendChild(strokeLine(xScale(eqX), yScale(0), xScale(eqX), yScale(eqY), C.faint, 1, '3,3'));
    plot.appendChild(strokeLine(xScale(0), yScale(eqY), xScale(eqX), yScale(eqY), C.faint, 1, '3,3'));
    overlay.appendChild(marker(xScale(eqX), yScale(eqY), C.ink, 5));

    const eqText = n === 2
      ? 'Nash eq. (' + Fmt.qty(eqX) + ', ' + Fmt.qty(eqY) + ')'
      : 'Symmetric eq. q\u1D62 = ' + Fmt.qty(eqY);
    const anchorEnd = eqX > totalMax * 0.62;
    overlay.appendChild(svgText(eqText, {
      x: xScale(eqX) + (anchorEnd ? -10 : 10),
      y: yScale(eqY) - 10,
      'text-anchor': anchorEnd ? 'end' : 'start',
      style: TXT.mono(C.ink),
    }));

    // Curve labels — R₂'s label sits on R₂ itself: points of R₂ are (BR(t), t).
    const x1 = totalMax * 0.14;
    overlay.appendChild(svgText(n === 2 ? 'R\u2081(q\u2082)' : 'BR\u1D62(Q\u208B\u1D62)', {
      x: xScale(x1) + 6, y: yScale(Econ.cournotBestResponse(a, b, mc, x1)) - 8, style: TXT.label(C.demand),
    }));
    if (n === 2) {
      const t = totalMax * 0.58;
      overlay.appendChild(svgText('R\u2082(q\u2081)', {
        x: xScale(Econ.cournotBestResponse(a, b, mc, t)) + 8, y: yScale(t) - 6, style: TXT.label(C.supply),
      }));
    }

    legendWrap.innerHTML = '';
    const items = [{ type: 'line', color: C.demand, label: n === 2 ? "R\u2081 — firm 1's best response" : "Firm i's best response" }];
    if (n === 2) items.push({ type: 'line', color: C.supply, label: "R\u2082 — firm 2's best response" });
    items.push({ type: 'line', color: C.ruleStrong, label: n === 2 ? '45\u00B0 line (q\u2081 = q\u2082)' : 'Symmetric ray (q\u1D62 = Q\u208B\u1D62/(n\u22121))' });
    legendWrap.appendChild(buildLegend(items));
  }

  function renderBertrandChart({ a, b, mc, n }) {
    const xMax = 6;                       // rounds of undercutting, illustrative
    const yMax = a * 0.6;
    const chart = buildChart({ width: 640, height: 400, xMax, yMax, xLabel: 'Round of undercutting', yLabel: 'Market price' });
    chartWrap.innerHTML = '';
    chartWrap.appendChild(chart.svg);
    const { plot, overlay, xScale, yScale } = chart;

    const startPrice = Math.min(a * 0.55, yMax * 0.95);
    const pts = [];
    let p = startPrice;
    for (let round = 0; round <= xMax; round++) {
      pts.push([xScale(round), yScale(p)]);
      p = mc + (p - mc) * 0.42;
    }
    plot.appendChild(svgEl('path', { d: linePath(pts), style: 'stroke:' + C.demand + ';stroke-width:2.25;fill:none' }));
    pts.forEach(pt => overlay.appendChild(marker(pt[0], pt[1], C.demand, 3.5)));

    plot.appendChild(strokeLine(xScale(0), yScale(mc), xScale(xMax), yScale(mc), C.supply, 2, '6,3'));
    overlay.appendChild(svgText('P = MC (equilibrium floor)', {
      x: xScale(xMax) - 6, y: yScale(mc) - 8, 'text-anchor': 'end', style: TXT.label(C.supply),
    }));

    legendWrap.innerHTML = '';
    legendWrap.appendChild(buildLegend([
      { type: 'line', color: C.demand, label: 'Price undercutting path (illustrative)' },
      { type: 'line', color: C.supply, label: 'Marginal cost (equilibrium price)' },
    ]));
    const note = document.createElement('p');
    note.className = 'sim-note';
    note.textContent = 'With ' + n + ' firms selling a homogeneous good at identical constant marginal cost, any price above MC invites undercutting by a rival — the unique equilibrium is P = MC regardless of n \u2265 2, so profits are driven to zero (the "Bertrand paradox").';
    legendWrap.appendChild(note);
  }

  firmsInput.addEventListener('input', (e) => {
    state.firms = Number(e.target.value);
    el('[data-role="v-firms"]').textContent = state.firms;
    computeAndRender();
  });
  mcInput.addEventListener('input', (e) => {
    state.mc = Number(e.target.value);
    el('[data-role="v-mc"]').textContent = Fmt.price(state.mc);
    computeAndRender();
  });
  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      state.mode = btn.dataset.mode;
      modeBtns.forEach(other => other.classList.toggle('active', other === btn));
      computeAndRender();
    });
  });

  computeAndRender();
}


/* ============================================================================
   SIMULATOR 4 — PRICE DISCRIMINATION
   With linear demand P = a − bQ, point elasticity at price p is
     ε(p) = p / (a − p)   — independent of the slope b.
   The discriminating price in a segment is p* = (a + mc)/2, so elasticity
   differences (and price differences) across segments are driven by the
   demand INTERCEPTS. The controls therefore slide a₁ and a₂, and the
   readouts report ε at each segment's price, with Lerner = 1/ε.
   ============================================================================ */

function mountPriceDiscrimination(container, config = {}) {
  const state = {
    degree: config.degree ?? 3,
    a1: config.a1 ?? config.seg1Intercept ?? 100,
    b1: config.b1 ?? config.seg1Slope ?? 1,
    a2: config.a2 ?? config.seg2Intercept ?? 70,
    b2: config.b2 ?? config.seg2Slope ?? 0.6,
    mc: config.mc ?? 20,
  };

  const root = document.createElement('div');
  root.className = 'sim-root';
  root.innerHTML =
    '<div class="sim-controls">' +
      '<div class="sim-control" style="flex-basis:100%;">' +
        '<span class="sim-label-row">Degree of price discrimination</span>' +
        '<div class="sim-toggle-group" role="group" aria-label="Degree">' +
          '<button type="button" class="sim-toggle-btn' + (state.degree === 1 ? ' active' : '') + '" data-degree="1">1st degree</button>' +
          '<button type="button" class="sim-toggle-btn' + (state.degree === 2 ? ' active' : '') + '" data-degree="2">2nd degree</button>' +
          '<button type="button" class="sim-toggle-btn' + (state.degree === 3 ? ' active' : '') + '" data-degree="3">3rd degree</button>' +
        '</div>' +
      '</div>' +
      '<label class="sim-control">' +
        '<span class="sim-label-row">Marginal cost <span class="sim-value" data-role="v-mc">' + Fmt.price(state.mc) + '</span></span>' +
        '<input type="range" data-role="in-mc" min="0" max="60" step="1" value="' + state.mc + '">' +
      '</label>' +
      '<label class="sim-control">' +
        '<span class="sim-label-row"><span data-role="a1-name">Segment 1 intercept a\u2081</span> <span class="sim-value" data-role="v-a1">' + state.a1 + '</span></span>' +
        '<input type="range" data-role="in-a1" min="60" max="140" step="1" value="' + state.a1 + '">' +
      '</label>' +
      '<label class="sim-control" data-role="a2-wrap">' +
        '<span class="sim-label-row">Segment 2 intercept a\u2082 <span class="sim-value" data-role="v-a2">' + state.a2 + '</span></span>' +
        '<input type="range" data-role="in-a2" min="40" max="110" step="1" value="' + state.a2 + '">' +
      '</label>' +
    '</div>' +
    '<div data-role="body"></div>';
  container.appendChild(root);

  const el = (sel) => root.querySelector(sel);
  const mcInput = el('[data-role="in-mc"]');
  const a1Input = el('[data-role="in-a1"]');
  const a2Input = el('[data-role="in-a2"]');
  const a2Wrap = el('[data-role="a2-wrap"]');
  const a1Name = el('[data-role="a1-name"]');
  const degreeBtns = root.querySelectorAll('.sim-toggle-btn');
  const bodyWrap = el('[data-role="body"]');

  function pointElasticity(a, p) {
    // ε = p / (a − p) for linear demand P = a − bQ; slope-free.
    return a - p > 1e-9 ? p / (a - p) : Infinity;
  }

  function computeAndRender() {
    a2Wrap.style.display = state.degree === 3 ? '' : 'none';
    a1Name.textContent = state.degree === 3 ? 'Segment 1 intercept a\u2081' : 'Demand intercept a';
    if (state.degree === 1) renderFirstDegree();
    else if (state.degree === 2) renderSecondDegree();
    else renderThirdDegree();
  }

  function renderFirstDegree() {
    const a = state.a1, b = state.b1, mc = state.mc;
    const comp = { q: Math.max(0, (a - mc) / b), p: mc };
    const producerCaptures = 0.5 * comp.q * (a - mc);

    bodyWrap.innerHTML =
      '<div class="sim-layout">' +
        '<div class="sim-svg-wrap" data-role="chart"></div>' +
        '<div class="sim-readouts">' +
          '<div class="readout-card"><div class="readout-label">Quantity (efficient)</div><div class="readout-value accent-slate">' + Fmt.qty(comp.q) + '</div></div>' +
          '<div class="readout-card"><div class="readout-label">Price = MC on last unit</div><div class="readout-value accent-slate">' + Fmt.price(mc) + '</div></div>' +
          '<div class="readout-card"><div class="readout-label">Producer surplus (all of it)</div><div class="readout-value accent-umber">' + Fmt.price(producerCaptures) + '</div></div>' +
          '<div class="readout-card"><div class="readout-label">Consumer surplus</div><div class="readout-value accent-sage">' + Fmt.price(0) + '</div></div>' +
          '<div class="readout-card"><div class="readout-label">Deadweight loss</div><div class="readout-value accent-red">' + Fmt.price(0) + '</div></div>' +
        '</div>' +
      '</div>' +
      '<p class="sim-note">Perfect (first-degree) discrimination charges each buyer their own willingness to pay. Output is efficient — identical to the competitive quantity — so <strong>deadweight loss is eliminated</strong>, but the firm captures the entire surplus that consumers would otherwise have kept.</p>';

    const chartWrap = bodyWrap.querySelector('[data-role="chart"]');
    const xMax = comp.q * 1.2 + 5, yMax = a * 1.05;
    const chart = buildChart({ width: 640, height: 360, xMax, yMax, xLabel: 'Quantity', yLabel: 'Price' });
    chartWrap.appendChild(chart.svg);
    const { plot, xScale, yScale } = chart;
    plot.appendChild(shade([
      [xScale(0), yScale(a)], [xScale(comp.q), yScale(mc)], [xScale(0), yScale(mc)],
    ], C.supply, 0.28));
    plot.appendChild(strokeLine(xScale(0), yScale(a), xScale(a / b), yScale(0), C.demand, 2.25));
    plot.appendChild(strokeLine(xScale(0), yScale(mc), xScale(xMax), yScale(mc), C.supply, 2, '6,3'));
  }

  function renderSecondDegree() {
    const a = state.a1, b = state.b1, mc = state.mc;
    const comp = { q: Math.max(0, (a - mc) / b), p: mc };
    const blocks = 3;
    const blockQ = comp.q / blocks;
    const blockPrices = [];
    for (let i = 0; i < blocks; i++) {
      const qMid = blockQ * i + blockQ / 2;
      blockPrices.push(Math.max(mc, a - b * qMid));
    }
    const revenue = blockPrices.reduce((sum, p) => sum + p * blockQ, 0);
    const profit = revenue - mc * comp.q;
    const single = Econ.monopolyOutcome(a, b, mc);
    const singleProfit = (single.p - mc) * single.q;

    bodyWrap.innerHTML =
      '<div class="sim-layout">' +
        '<div class="sim-svg-wrap" data-role="chart"></div>' +
        '<div class="sim-readouts">' +
          '<div class="readout-card"><div class="readout-label">Block prices (declining)</div><div class="readout-value accent-slate">' + blockPrices.map(p => Fmt.price(p)).join(' / ') + '</div></div>' +
          '<div class="readout-card"><div class="readout-label">Total quantity sold</div><div class="readout-value accent-slate">' + Fmt.qty(comp.q) + '</div></div>' +
          '<div class="readout-card"><div class="readout-label">Profit, block pricing</div><div class="readout-value accent-umber">' + Fmt.price(profit) + '</div></div>' +
          '<div class="readout-card"><div class="readout-label">Profit, single price</div><div class="readout-value">' + Fmt.price(singleProfit) + '</div></div>' +
        '</div>' +
      '</div>' +
      '<p class="sim-note">Second-degree discrimination (quantity/block pricing) charges a <strong>declining price per additional block</strong> of the same good, sorting buyers by how much they purchase rather than by directly observing type. Shown here as ' + blocks + ' declining blocks approximating the demand curve; output and profit sit between single pricing and perfect discrimination.</p>';

    const chartWrap = bodyWrap.querySelector('[data-role="chart"]');
    const xMax = comp.q * 1.2 + 5, yMax = a * 1.05;
    const chart = buildChart({ width: 640, height: 360, xMax, yMax, xLabel: 'Quantity', yLabel: 'Price' });
    chartWrap.appendChild(chart.svg);
    const { plot, xScale, yScale } = chart;
    for (let i = 0; i < blocks; i++) {
      const qStart = blockQ * i, qEnd = blockQ * (i + 1);
      plot.appendChild(svgEl('rect', {
        x: xScale(qStart), y: yScale(blockPrices[i]),
        width: xScale(qEnd) - xScale(qStart), height: yScale(mc) - yScale(blockPrices[i]),
        style: 'fill:' + C.supply + ';opacity:' + (0.22 + i * 0.07) + ';stroke:' + C.supply + ';stroke-width:1',
      }));
    }
    plot.appendChild(strokeLine(xScale(0), yScale(a), xScale(a / b), yScale(0), C.demand, 2.25));
    plot.appendChild(strokeLine(xScale(0), yScale(mc), xScale(xMax), yScale(mc), C.supply, 2, '6,3'));
  }

  function renderThirdDegree() {
    const { a1, b1, a2, b2, mc } = state;

    const seg1 = Econ.monopolyOutcome(a1, b1, mc);
    const seg2 = Econ.monopolyOutcome(a2, b2, mc);
    const served1 = seg1.q > 0.001, served2 = seg2.q > 0.001;
    const e1 = pointElasticity(a1, seg1.p);
    const e2 = pointElasticity(a2, seg2.p);
    const profitDisc = (seg1.p - mc) * seg1.q + (seg2.p - mc) * seg2.q;
    const csDisc = Econ.consumerSurplus(a1, seg1.p, seg1.q) + Econ.consumerSurplus(a2, seg2.p, seg2.q);
    const qDisc = seg1.q + seg2.q;

    // Single-price benchmark over the kinked aggregate demand.
    let bestP = mc, bestProfit = -Infinity;
    const pTop = Math.max(a1, a2);
    for (let p = mc; p <= pTop; p += 0.05) {
      const q1 = Math.max(0, (a1 - p) / b1);
      const q2 = Math.max(0, (a2 - p) / b2);
      const profit = (p - mc) * (q1 + q2);
      if (profit > bestProfit) { bestProfit = profit; bestP = p; }
    }
    const q1S = Math.max(0, (a1 - bestP) / b1);
    const q2S = Math.max(0, (a2 - bestP) / b2);
    const csSingle = Econ.consumerSurplus(a1, bestP, q1S) + Econ.consumerSurplus(a2, bestP, q2S);
    const qSingle = q1S + q2S;

    const fmtSeg = (out, e, served) =>
      Fmt.price(out.p) + ' / ' + Fmt.qty(out.q) + (served ? ' / \u03B5 ' + Fmt.num(e, 2) : ' / not served');

    bodyWrap.innerHTML =
      '<div class="sim-readouts" style="grid-template-columns:repeat(2,1fr);margin-bottom:1rem;">' +
        '<div class="readout-card"><div class="readout-label">Segment 1: p / q / \u03B5 at p</div><div class="readout-value accent-slate">' + fmtSeg(seg1, e1, served1) + '</div></div>' +
        '<div class="readout-card"><div class="readout-label">Segment 2: p / q / \u03B5 at p</div><div class="readout-value accent-maroon">' + fmtSeg(seg2, e2, served2) + '</div></div>' +
        '<div class="readout-card"><div class="readout-label">Single price / total Q</div><div class="readout-value">' + Fmt.price(bestP) + ' / ' + Fmt.qty(qSingle) + '</div></div>' +
        '<div class="readout-card"><div class="readout-label">Output: disc. vs single</div><div class="readout-value">' + Fmt.qty(qDisc) + ' / ' + Fmt.qty(qSingle) + '</div></div>' +
      '</div>' +
      '<div class="sim-layout" style="grid-template-columns:1fr 1fr;">' +
        '<div>' +
          '<p class="sim-caption" style="margin-top:0;">Discriminating (two segment prices)</p>' +
          '<div class="sim-svg-wrap" data-role="chart-discrim"></div>' +
          '<div class="sim-readouts" style="grid-template-columns:1fr 1fr;margin-top:0.55rem;">' +
            '<div class="readout-card"><div class="readout-label">Profit</div><div class="readout-value accent-umber">' + Fmt.price(profitDisc) + '</div></div>' +
            '<div class="readout-card"><div class="readout-label">Consumer surplus</div><div class="readout-value accent-sage">' + Fmt.price(csDisc) + '</div></div>' +
          '</div>' +
        '</div>' +
        '<div>' +
          '<p class="sim-caption" style="margin-top:0;">Single price (both segments)</p>' +
          '<div class="sim-svg-wrap" data-role="chart-single"></div>' +
          '<div class="sim-readouts" style="grid-template-columns:1fr 1fr;margin-top:0.55rem;">' +
            '<div class="readout-card"><div class="readout-label">Profit</div><div class="readout-value accent-umber">' + Fmt.price(bestProfit) + '</div></div>' +
            '<div class="readout-card"><div class="readout-label">Consumer surplus</div><div class="readout-value accent-sage">' + Fmt.price(csSingle) + '</div></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<p class="sim-note">Third-degree discrimination sets a separate profit-maximizing price in each segment. With linear demand, the price in a segment satisfies the inverse-elasticity rule (p \u2212 MC)/p = 1/\u03B5, and \u03B5 at the chosen price depends only on the demand <strong>intercept</strong> — the stronger-demand (higher-a) segment is less elastic at its price and pays more, while the slope drops out entirely. Whether total welfare rises or falls relative to single pricing tracks whether discrimination expands total output (compare the output readout above); unlike first-degree discrimination, it can go either way.</p>';

    const xAll = Math.max(seg1.q, seg2.q, q1S, q2S) * 1.25 + 3;
    const yAll = Math.max(a1, a2) * 1.05;
    const panelMargin = { top: 14, right: 14, bottom: 34, left: 44 };

    const drawPanel = (wrapSel, out1, out2, hlineP) => {
      const chart = buildChart({ width: 300, height: 250, xMax: xAll, yMax: yAll, xLabel: 'Q', yLabel: 'P', margin: panelMargin });
      bodyWrap.querySelector(wrapSel).appendChild(chart.svg);
      const { plot, overlay, xScale, yScale } = chart;
      plot.appendChild(strokeLine(xScale(0), yScale(a1), xScale(a1 / b1), yScale(0), C.demand, 2));
      plot.appendChild(strokeLine(xScale(0), yScale(a2), xScale(a2 / b2), yScale(0), C.seg2, 2));
      plot.appendChild(strokeLine(xScale(0), yScale(mc), xScale(xAll), yScale(mc), C.supply, 1.4, '5,3'));
      if (hlineP != null) plot.appendChild(strokeLine(xScale(0), yScale(hlineP), xScale(xAll), yScale(hlineP), C.ink, 1.3, '2,3'));
      if (out1.q > 0.01) overlay.appendChild(marker(xScale(out1.q), yScale(out1.p), C.demand, 3.5));
      if (out2.q > 0.01) overlay.appendChild(marker(xScale(out2.q), yScale(out2.p), C.seg2, 3.5));
    };

    drawPanel('[data-role="chart-discrim"]', seg1, seg2, null);
    drawPanel('[data-role="chart-single"]', { p: bestP, q: q1S }, { p: bestP, q: q2S }, bestP);

    let legendWrap = bodyWrap.querySelector('[data-role="legend3"]');
    if (!legendWrap) {
      legendWrap = document.createElement('div');
      legendWrap.setAttribute('data-role', 'legend3');
      bodyWrap.appendChild(legendWrap);
    }
    legendWrap.innerHTML = '';
    legendWrap.appendChild(buildLegend([
      { type: 'line', color: C.demand, label: 'Segment 1 demand' },
      { type: 'line', color: C.seg2, label: 'Segment 2 demand' },
      { type: 'line', color: C.supply, label: 'Marginal cost' },
      { type: 'line', color: C.ink, label: 'Single price (right panel)' },
    ]));
  }

  mcInput.addEventListener('input', (e) => {
    state.mc = Number(e.target.value);
    el('[data-role="v-mc"]').textContent = Fmt.price(state.mc);
    computeAndRender();
  });
  a1Input.addEventListener('input', (e) => {
    state.a1 = Number(e.target.value);
    el('[data-role="v-a1"]').textContent = state.a1;
    computeAndRender();
  });
  a2Input.addEventListener('input', (e) => {
    state.a2 = Number(e.target.value);
    el('[data-role="v-a2"]').textContent = state.a2;
    computeAndRender();
  });
  degreeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      state.degree = Number(btn.dataset.degree);
      degreeBtns.forEach(other => other.classList.toggle('active', other === btn));
      computeAndRender();
    });
  });

  computeAndRender();
}


/* ============================================================================
   SIMULATOR 5 — GAME THEORY PAYOFF MATRIX
   ============================================================================ */

const GT_PRESETS = {
  prisoners: {
    rowLabels: ['Cooperate', 'Defect'],
    colLabels: ['Cooperate', 'Defect'],
    payoffs: [
      [[3, 3], [0, 5]],
      [[5, 0], [1, 1]],
    ],
  },
  chicken: {
    rowLabels: ['Swerve', 'Straight'],
    colLabels: ['Swerve', 'Straight'],
    payoffs: [
      [[3, 3], [1, 4]],
      [[4, 1], [0, 0]],
    ],
  },
  coordination: {
    rowLabels: ['Opera', 'Football'],
    colLabels: ['Opera', 'Football'],
    payoffs: [
      [[2, 1], [0, 0]],
      [[0, 0], [1, 2]],
    ],
  },
  stagHunt: {
    rowLabels: ['Stag', 'Hare'],
    colLabels: ['Stag', 'Hare'],
    payoffs: [
      [[4, 4], [0, 3]],
      [[3, 0], [2, 2]],
    ],
  },
};

function mountGameTheory(container, config = {}) {
  const presetKey = config.preset && GT_PRESETS[config.preset] ? config.preset : 'prisoners';
  const presetData = GT_PRESETS[presetKey];

  const state = {
    rowLabels: config.rowLabels ? [...config.rowLabels] : [...presetData.rowLabels],
    colLabels: config.colLabels ? [...config.colLabels] : [...presetData.colLabels],
    payoffs: config.payoffs
      ? config.payoffs.map(row => row.map(cell => [...cell]))
      : presetData.payoffs.map(row => row.map(cell => [...cell])),
  };

  const root = document.createElement('div');
  root.className = 'sim-root';
  root.innerHTML =
    '<div class="sim-controls gt-presets">' +
      '<label class="sim-control">' +
        '<span class="sim-label-row">Preset game</span>' +
        '<select class="sim-select" data-role="preset-select">' +
          '<option value="prisoners">Prisoner\u2019s Dilemma</option>' +
          '<option value="chicken">Chicken</option>' +
          '<option value="coordination">Coordination Game</option>' +
          '<option value="stagHunt">Stag Hunt</option>' +
          '<option value="custom">Custom</option>' +
        '</select>' +
      '</label>' +
    '</div>' +
    '<div class="gt-wrap">' +
      '<table class="gt-table" data-role="gt-table"></table>' +
    '</div>' +
    '<div data-role="legend"></div>';
  container.appendChild(root);

  const el = (sel) => root.querySelector(sel);
  const presetSelect = el('[data-role="preset-select"]');
  presetSelect.value = presetKey;
  const tableEl = el('[data-role="gt-table"]');
  const legendWrap = el('[data-role="legend"]');

  function computeBestResponsesAndNash() {
    const rowBR = [[false, false], [false, false]];
    const colBR = [[false, false], [false, false]];

    for (let c = 0; c < 2; c++) {
      const top = state.payoffs[0][c][0], bottom = state.payoffs[1][c][0];
      if (top >= bottom) rowBR[0][c] = true;
      if (bottom >= top) rowBR[1][c] = true;
    }
    for (let r = 0; r < 2; r++) {
      const left = state.payoffs[r][0][1], right = state.payoffs[r][1][1];
      if (left >= right) colBR[r][0] = true;
      if (right >= left) colBR[r][1] = true;
    }

    const nash = [[false, false], [false, false]];
    for (let r = 0; r < 2; r++) {
      for (let c = 0; c < 2; c++) nash[r][c] = rowBR[r][c] && colBR[r][c];
    }
    return { rowBR, colBR, nash };
  }

  function gtCellHTML(r, c, rowBR, colBR, nash) {
    const p1 = state.payoffs[r][c][0], p2 = state.payoffs[r][c][1];
    const isNash = nash[r][c];
    return (
      '<td class="gt-cell' + (isNash ? ' is-nash' : '') + '">' +
        (isNash ? '<span class="gt-nash-tag">NASH</span>' : '') +
        '<div class="gt-payoff-grid">' +
          '<input type="number" class="gt-payoff-input p1' + (rowBR[r][c] ? ' is-br' : '') + '" data-role="payoff" data-r="' + r + '" data-c="' + c + '" data-player="0" value="' + p1 + '" aria-label="Player 1 payoff, row ' + (r + 1) + ' column ' + (c + 1) + '">' +
          '<input type="number" class="gt-payoff-input p2' + (colBR[r][c] ? ' is-br' : '') + '" data-role="payoff" data-r="' + r + '" data-c="' + c + '" data-player="1" value="' + p2 + '" aria-label="Player 2 payoff, row ' + (r + 1) + ' column ' + (c + 1) + '">' +
        '</div>' +
      '</td>'
    );
  }

  function render() {
    const { rowBR, colBR, nash } = computeBestResponsesAndNash();

    tableEl.innerHTML =
      '<tr>' +
        '<th class="gt-corner"></th>' +
        '<th class="gt-corner"></th>' +
        '<th colspan="2" style="font-family:var(--font-mono);font-size:0.7rem;color:var(--umber);font-weight:400;padding-bottom:0.3rem;border:none;background:transparent;">Player 2</th>' +
      '</tr>' +
      '<tr>' +
        '<th class="gt-corner"></th>' +
        '<th class="gt-corner"></th>' +
        '<th class="gt-col-label"><input class="gt-label-input" data-role="col-label" data-idx="0" value="' + state.colLabels[0] + '" aria-label="Player 2 strategy 1 label"></th>' +
        '<th class="gt-col-label"><input class="gt-label-input" data-role="col-label" data-idx="1" value="' + state.colLabels[1] + '" aria-label="Player 2 strategy 2 label"></th>' +
      '</tr>' +
      '<tr>' +
        '<th class="gt-corner" rowspan="2" style="writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--font-mono);font-size:0.7rem;color:var(--slate);font-weight:400;padding-right:0.4rem;">Player 1</th>' +
        '<th class="gt-row-label"><input class="gt-label-input" data-role="row-label" data-idx="0" value="' + state.rowLabels[0] + '" aria-label="Player 1 strategy 1 label"></th>' +
        gtCellHTML(0, 0, rowBR, colBR, nash) +
        gtCellHTML(0, 1, rowBR, colBR, nash) +
      '</tr>' +
      '<tr>' +
        '<th class="gt-row-label"><input class="gt-label-input" data-role="row-label" data-idx="1" value="' + state.rowLabels[1] + '" aria-label="Player 1 strategy 2 label"></th>' +
        gtCellHTML(1, 0, rowBR, colBR, nash) +
        gtCellHTML(1, 1, rowBR, colBR, nash) +
      '</tr>';

    legendWrap.innerHTML = '';
    legendWrap.appendChild(buildLegend([
      { type: 'swatch', color: 'var(--sage-wash)', label: 'Nash equilibrium cell' },
    ]));
    const note = document.createElement('p');
    note.className = 'sim-note';
    const nashCount = nash.flat().filter(Boolean).length;
    note.textContent = nashCount === 0
      ? 'No pure-strategy Nash equilibrium exists in this game — best responses cycle (a mixed-strategy equilibrium exists instead).'
      : "Player 1's payoff (left entry of each cell) is underlined where that row is a best response to the column; Player 2's payoff (right entry) is underlined where that column is a best response to the row. Cells with both entries underlined are pure-strategy Nash equilibria. Edit any payoff or label directly.";
    legendWrap.appendChild(note);

    attachCellListeners();
  }

  function attachCellListeners() {
    root.querySelectorAll('[data-role="payoff"]').forEach(input => {
      input.addEventListener('input', (e) => {
        const r = Number(e.target.dataset.r), c = Number(e.target.dataset.c), p = Number(e.target.dataset.player);
        const v = e.target.value === '' ? 0 : Number(e.target.value);
        state.payoffs[r][c][p] = v;
        presetSelect.value = 'custom';
        let caret = null;
        try { caret = e.target.selectionStart; } catch (_e) {}
        render();
        const restored = root.querySelector('[data-role="payoff"][data-r="' + r + '"][data-c="' + c + '"][data-player="' + p + '"]');
        if (restored) {
          restored.focus();
          if (caret != null) { try { restored.setSelectionRange(caret, caret); } catch (_e) {} }
        }
      });
    });
    root.querySelectorAll('[data-role="row-label"]').forEach(input => {
      input.addEventListener('input', (e) => {
        state.rowLabels[Number(e.target.dataset.idx)] = e.target.value;
      });
    });
    root.querySelectorAll('[data-role="col-label"]').forEach(input => {
      input.addEventListener('input', (e) => {
        state.colLabels[Number(e.target.dataset.idx)] = e.target.value;
      });
    });
  }

  presetSelect.addEventListener('change', (e) => {
    const key = e.target.value;
    if (key === 'custom') return;
    const preset = GT_PRESETS[key];
    state.rowLabels = [...preset.rowLabels];
    state.colLabels = [...preset.colLabels];
    state.payoffs = preset.payoffs.map(row => row.map(cell => [...cell]));
    render();
  });

  render();
}

   HUD — tab switching, sticky-pinned shadow, live reading-position status
   ============================================================================ */

const hudEl = document.getElementById('hud');
const hudStatusEl = document.querySelector('[data-role="hud-status"]');
const hudIndicatorEl = document.querySelector('[data-role="hud-tab-indicator"]');
const hudTabButtons = Array.from(document.querySelectorAll('.hud-tab'));
const hudTabsEl = document.querySelector('.hud-tabs');
const feedPanels = {
  lectures: document.getElementById('feed-lectures'),
  psets: document.getElementById('feed-psets'),
};

let activeTab = 'lectures';
let positionObserver = null;

function positionTabIndicator() {
  const btn = hudTabButtons.find(b => b.dataset.tab === activeTab);
  if (!btn || !hudIndicatorEl) return;
  hudIndicatorEl.style.left = btn.offsetLeft + 'px';
  hudIndicatorEl.style.width = btn.offsetWidth + 'px';
}

function updateHudIdleStatus() {
  if (!hudStatusEl) return;
  if (activeTab === 'lectures') {
    const n = LECTURES.length;
    hudStatusEl.textContent = n + (n === 1 ? ' lecture posted' : ' lectures posted');
  } else {
    const n = PROBLEM_SETS.length;
    hudStatusEl.textContent = n + (n === 1 ? ' problem set posted' : ' problem sets posted');
  }
}

// Tracks whichever post header sits nearest the top of the viewport, inside
// a thin band just under the HUD, and mirrors its label into hudStatusEl.
// Falls back to the idle count whenever nothing in that band is in view —
// above the feed, between posts, or below the last one.
function watchReadingPosition(tab) {
  if (positionObserver) positionObserver.disconnect();
  if (!hudStatusEl || typeof IntersectionObserver === 'undefined') return;

  const root = feedPanels[tab];
  const selector = tab === 'lectures' ? '.lecture-header' : '.pset-header';
  const headers = root ? root.querySelectorAll(selector) : [];
  updateHudIdleStatus();
  if (!headers.length) return;

  positionObserver = new IntersectionObserver((entries) => {
    const visible = entries.filter(e => e.isIntersecting);
    if (visible.length === 0) { updateHudIdleStatus(); return; }
    const topMost = visible.reduce((a, b) =>
      a.boundingClientRect.top < b.boundingClientRect.top ? a : b);
    const label = topMost.target.dataset.hudLabel;
    if (label) hudStatusEl.textContent = label;
  }, { rootMargin: '-10% 0px -80% 0px', threshold: 0 });

  headers.forEach(h => positionObserver.observe(h));
}

function activateTab(tab, { persist = true } = {}) {
  if (tab !== 'lectures' && tab !== 'psets') return;
  activeTab = tab;
  hudTabButtons.forEach((b) => {
    const isActive = b.dataset.tab === tab;
    b.classList.toggle('is-active', isActive);
    b.setAttribute('aria-selected', String(isActive));
    b.tabIndex = isActive ? 0 : -1;
  });
  if (feedPanels.lectures) feedPanels.lectures.hidden = tab !== 'lectures';
  if (feedPanels.psets) feedPanels.psets.hidden = tab !== 'psets';
  positionTabIndicator();
  watchReadingPosition(tab);
  if (persist) storage.set('activeTab', tab);
}

// Single entry point for both initial load and hashchange: try each post
// type's own deep-link pattern, then plain #lectures / #psets tab links.
function handleHashRoute() {
  restoreAnyMaximized();
  closeFootnotePopover();
  if (openFromHash()) return;
  if (openPsetFromHash()) return;
  if (location.hash === '#lectures') { activateTab('lectures'); return; }
  if (location.hash === '#psets') { activateTab('psets'); return; }
}

hudTabButtons.forEach((btn) => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

if (hudTabsEl) {
  hudTabsEl.addEventListener('keydown', (e) => {
    if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
    e.preventDefault();
    const idx = hudTabButtons.findIndex(b => b.dataset.tab === activeTab);
    const nextIdx = e.key === 'ArrowRight'
      ? (idx + 1) % hudTabButtons.length
      : (idx - 1 + hudTabButtons.length) % hudTabButtons.length;
    const nextBtn = hudTabButtons[nextIdx];
    nextBtn.focus();
    activateTab(nextBtn.dataset.tab);
  });
}

window.addEventListener('resize', positionTabIndicator);
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(positionTabIndicator);
}

renderFeed();
renderPsetFeed();

// Sticky/pinned shadow: watch a 1px sentinel placed just above the HUD.
// Once it scrolls out of view, the HUD's own position:sticky has taken
// hold, so switch on the shadow and compact brand mark.
const hudSentinelEl = document.getElementById('hud-sentinel');
if (hudSentinelEl && hudEl && typeof IntersectionObserver !== 'undefined') {
  new IntersectionObserver(
    ([entry]) => hudEl.classList.toggle('is-pinned', !entry.isIntersecting),
    { threshold: 0 }
  ).observe(hudSentinelEl);
}

document.querySelector('[data-role="expand-all"]').addEventListener('click', () => {
  if (activeTab === 'lectures') lecturesSorted().forEach(l => setExpanded(l, true));
  else psetsSorted().forEach(p => setPsetExpanded(p, true));
});
document.querySelector('[data-role="collapse-all"]').addEventListener('click', () => {
  if (activeTab === 'lectures') lecturesSorted().forEach(l => setExpanded(l, false));
  else psetsSorted().forEach(p => setPsetExpanded(p, false));
});

const storedTab = storage.get('activeTab');
activateTab(storedTab === 'psets' ? 'psets' : 'lectures', { persist: false });

const heroMetaEl = document.querySelector('[data-role="hero-meta"]');
if (heroMetaEl) {
  const nLec = LECTURES.length, nPset = PROBLEM_SETS.length;
  heroMetaEl.innerHTML =
    '<span><strong>' + nLec + '</strong> ' + (nLec === 1 ? 'lecture' : 'lectures') + '</span>' +
    '<span><strong>' + nPset + '</strong> ' + (nPset === 1 ? 'problem set' : 'problem sets') + '</span>';
}

window.addEventListener('hashchange', handleHashRoute);
handleHashRoute();
</script>
</body>
</html>
