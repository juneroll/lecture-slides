<!--
================================================================================
README — Industrial Organization & Competition Lecture Site
================================================================================

WHAT THIS IS
A single-file course site with two tabs, switched from the sticky HUD bar
under the masthead: LECTURES (a reverse-chronological feed of collapsible
weekly posts) and PROBLEM SETS (the same accordion pattern, but each post
holds individually numbered problems with a "Show solution" reveal).
Posts in either tab can embed live economics simulators (Supply & Demand,
Monopoly, Cournot/Bertrand, Price Discrimination, Game Theory)
declaratively — one <div data-sim="..."> per figure, no ids, no separate
mount registry.

The HUD (the bar with the tabs) is sticky — it sits inline under the hero
until you scroll, then pins to the top of the viewport. While pinned, its
right-hand status readout tracks whichever post is currently scrolled to
the top of the feed; scroll away from any post and it falls back to a
plain count of what's in the active tab.

--------------------------------------------------------------------------------
HOW TO ADD A NEW LECTURE POST
--------------------------------------------------------------------------------
Find the `LECTURES` array in the <script> block (search for
"LECTURE DATA — EDIT THIS ARRAY"). Add a new object. Order in the array
does not matter — the feed always sorts by `number` descending, and the
highest-numbered lecture starts expanded.

Blank post to copy:

  {
    id: 'lec2',                     // unique, no spaces — used for DOM ids
    number: 2,
    title: 'Lecture title',
    date: '2026-01-12',             // YYYY-MM-DD
    summary: 'One-line teaser shown when the post is collapsed.',
    bodyHTML: `
      <p>Lecture prose as plain HTML — paragraphs, lists, h4/h5 headers
      (h1–h3 are reserved for site chrome), blockquotes, <code>code</code>.</p>

      <div data-sim="cournot"
           data-config='{"firms": 3}'
           data-caption="Cournot equilibrium, three firms"></div>
    `
  },

--------------------------------------------------------------------------------
HOW TO ADD A NEW PROBLEM SET
--------------------------------------------------------------------------------
Find the `PROBLEM_SETS` array in the <script> block (search for
"PROBLEM SET DATA — EDIT THIS ARRAY"). Same sorting rule as lectures —
order in the array doesn't matter, it always sorts by `number` descending.

Blank set to copy:

  {
    id: 'ps2',                       // unique, no spaces — used for DOM ids
    number: 2,
    title: 'Set subtitle only — the "PS 2" numbering is added for you',
    assignedDate: '2026-01-12',      // YYYY-MM-DD
    dueDate: '2026-01-19',           // YYYY-MM-DD
    summary: 'One-line teaser shown when the post is collapsed.',
    topics: ['Topic chip one', 'Topic chip two'],   // optional, omit for none
    bodyHTML: `
      <p>Optional preamble/instructions, same plain-HTML rules as a
      lecture post's bodyHTML. Can also hold <div data-sim="..."> figures.</p>
    `,
    problems: [
      {
        id: 'p1',                    // unique within this set
        points: 10,                  // optional — omit to hide the badge
        prompt: `<p>The question, as plain HTML.</p>`,
        solution: `<p>The worked answer, hidden behind "Show solution"
        until the reader clicks it.</p>`
      },
      // ...more problems
    ]
  },

Each problem gets its own reveal toggle; nothing in `solution` is visible
until the reader opens it, and it stays open independently of the others
while the set itself is expanded. A problem's `prompt` or `solution` can
contain a <div data-sim="..."> figure exactly like a lecture — see below.

--------------------------------------------------------------------------------
HOW TO EMBED A SIMULATOR (one div, nothing else)
--------------------------------------------------------------------------------
Drop a single div anywhere in bodyHTML:

  <div data-sim="NAME" data-config='{...}' data-caption="..."></div>

• data-sim      required. One of:
                  supply-demand | monopoly | cournot |
                  price-discrimination | game-theory
• data-config   optional JSON. Unknown keys are ignored; a typo in the
                JSON logs a console warning and mounts with defaults.
• data-caption  optional. Figure numbers are generated automatically as
                "Figure {number}.{k} — {your caption}", numbered in
                document order within the post. Inside a problem set the
                prefix reads "Figure PS{number}.{k}" instead, so lecture
                and problem-set figures never look like the same series.

Simulators mount lazily the first time a post is expanded, and never
remount (so a simulator keeps its live state when a post is collapsed
and re-expanded). An unknown data-sim name renders a visible error chip
listing the valid names.

Config keys by simulator (all optional):

  supply-demand          demandIntercept, demandSlope, supplyIntercept,
                         supplySlope                       (100, 1, 10, 1)
  monopoly               demandIntercept, demandSlope, mc  (100, 1, 20)
  cournot                demandIntercept, demandSlope, mc,
                         firms (2–5), mode 'cournot'|'bertrand'
  price-discrimination   degree (1|2|3), a1, a2, mc        (3, 100, 70, 20)
  game-theory            preset 'prisoners'|'chicken'|'coordination'|
                         'stagHunt', rowLabels, colLabels, payoffs

--------------------------------------------------------------------------------
STORAGE (accordion open/closed state, active tab)
--------------------------------------------------------------------------------
One flag at the top of the <script> block:

    const USE_LOCAL_STORAGE = false;

Leave it false inside a Claude.ai artifact — the artifact sandbox throws
on any access to window.localStorage, so enabling it there breaks the
page. Set it true only when this file is served from a real web server
and you want open/closed state (and the last-viewed tab) to survive
reloads. Everything else reads and writes through the same storage
interface either way, under three keys: `accordionState` (lectures),
`psetAccordionState` (problem sets), and `activeTab`.

--------------------------------------------------------------------------------
ALSO WORTH KNOWING
--------------------------------------------------------------------------------
• Deep links: share  page.html#post-lec3  for a lecture or
  page.html#pset-ps2  for a problem set — either switches to the right
  tab, expands that post, and scrolls it into view on load.
• "Expand all" in the HUD also makes browser find (Ctrl/Cmd-F) work
  across every post in the active tab, since collapsed content is
  unsearchable; it only acts on whichever tab (lectures or problem sets)
  is currently showing.
• The HUD's number badges use color to tell the two tabs apart at a
  glance: maroon "№" for lectures, slate "PS" for problem sets. Same
  palette everywhere else, just a different accent per collection.
• Chart color semantics are consistent across all simulators:
  demand = slate, cost/supply/producer surplus/profit = umber,
  consumer surplus = sage, deadweight loss = red, segment 2 = maroon.

================================================================================
-->

/* ============================================================================
   DESIGN SYSTEM
   Palette: paper / ink / Chicago maroon / slate / umber / sage / red
   Type: Source Serif 4 (display + lecture prose), Source Sans 3 (UI),
         JetBrains Mono (data, captions, eyebrows)
   ============================================================================ */

@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* Palette */
  --paper:        #F6F3EA;
  --paper-raised: #FCFAF4;
  --ink:          #1C1A17;
  --ink-soft:     #524E46;
  --ink-faint:    #8B857A;
  --rule:         #DED8CA;
  --rule-strong:  #C6BEAC;
  --grid-line:    #EAE4D4;

  --maroon:       #800000;
  --maroon-wash:  #F2E5E2;

  --slate:        #33566B;
  --slate-wash:   #E7EDF0;

  --umber:        #7A5238;
  --umber-wash:   #F1E8DF;

  --sage:         #587459;
  --sage-wash:    #E8EEE6;

  --red:          #C13B2A;
  --red-wash:     #F6E6E1;

  /* Type */
  --font-display: 'Source Serif 4', Georgia, serif;
  --font-body:    'Source Sans 3', -apple-system, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, monospace;

  /* Layout */
  --content-width: 760px;
  --radius: 3px;
  --radius-pill: 999px;
  --shadow-card: 0 1px 2px rgba(28,26,23,0.05), 0 3px 12px rgba(28,26,23,0.04);
  --shadow-hud: 0 6px 20px rgba(28,26,23,0.09);
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

::selection { background: var(--maroon-wash); color: var(--maroon); }

a { color: var(--maroon); }

:focus-visible {
  outline: 2px solid var(--maroon);
  outline-offset: 2px;
  border-radius: 2px;
}

/* ---------------------------------------------------------------------------

   --------------------------------------------------------------------------- */

.site-header {
  border-bottom: 1px solid var(--rule);
  background: var(--paper-raised);
  position: relative;
}

.site-header::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 3px;
  background: repeating-linear-gradient(
    90deg,
    var(--maroon) 0px, var(--maroon) 28px,
    transparent 28px, transparent 34px
  );
  opacity: 0.3;
}

.site-header-inner {
  max-width: var(--content-width);
  margin: 0 auto;
  padding: 3rem 1.5rem 2.25rem;
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin: 0 0 0.9rem;
  display: flex;
  align-items: center;
  gap: 0.6em;
}

.eyebrow::before {
  content: '';
  width: 7px; height: 7px;
  background: var(--maroon);
  border-radius: 50%;
  display: inline-block;
}

.site-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(1.9rem, 4vw, 2.6rem);
  line-height: 1.15;
  margin: 0 0 0.6rem;
  letter-spacing: -0.01em;
}

.site-desc {
  color: var(--ink-soft);
  font-size: 1.02rem;
  max-width: 54ch;
  margin: 0;
}

.hero-meta {
  display: flex;
  gap: 1.5em;
  margin: 1.4rem 0 0;
  padding-top: 1.1rem;
  border-top: 1px solid var(--rule);
  font-family: var(--font-mono);
  font-size: 0.74rem;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
}
.hero-meta strong {
  color: var(--ink-soft);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* ---------------------------------------------------------------------------
   HUD — sticky section switcher (tabs, live reading position, actions)
   --------------------------------------------------------------------------- */

.hud-sentinel { height: 1px; }

.hud {
  position: sticky;
  top: 0;
  z-index: 30;
  background: var(--paper-raised);
  border-bottom: 1px solid var(--rule);
  transition: box-shadow 0.2s ease, border-color 0.2s ease;
}

.hud.is-pinned {
  box-shadow: var(--shadow-hud);
  border-bottom-color: var(--rule-strong);
}

.hud-inner {
  max-width: var(--content-width);
  margin: 0 auto;
  padding: 0.85rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.hud-mark {
  display: flex;
  align-items: center;
  gap: 0.55em;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.92rem;
  color: var(--ink);
  white-space: nowrap;
  flex-shrink: 0;
  opacity: 0;
  max-width: 0;
  overflow: hidden;
  transition: opacity 0.2s ease, max-width 0.3s ease, margin 0.3s ease;
}
.hud-mark::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--maroon);
  flex-shrink: 0;
}
.hud.is-pinned .hud-mark {
  opacity: 1;
  max-width: 220px;
  margin-right: 0.15rem;
}

.hud-tabs {
  position: relative;
  display: flex;
  gap: 1.7rem;
  flex-shrink: 0;
}

.hud-tab {
  font: inherit;
  font-family: var(--font-mono);
  font-size: 0.76rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink-faint);
  background: none;
  border: none;
  padding: 0.45rem 0.05rem;
  cursor: pointer;
}
.hud-tab:hover { color: var(--ink-soft); }
.hud-tab.is-active { color: var(--maroon); }

.hud-tab-indicator {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  width: 0;
  background: var(--maroon);
  transition: left 0.25s ease, width 0.25s ease;
}

.hud-status {
  flex: 1;
  min-width: 0;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.02em;
  color: var(--ink-faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: right;
}

.hud-actions {
  display: flex;
  gap: 0.9rem;
  align-items: baseline;
  flex-shrink: 0;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  color: var(--ink-faint);
}

.hud-btn {
  font: inherit;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--maroon);
  background: none;
  border: none;
  border-bottom: 1px solid transparent;
  padding: 0.1rem 0;
  cursor: pointer;
  white-space: nowrap;
}
.hud-btn:hover { border-bottom-color: var(--maroon); }

/* ---------------------------------------------------------------------------
   Lecture feed
   --------------------------------------------------------------------------- */

.feed {
  max-width: var(--content-width);
  margin: 0 auto;
  padding: 1.1rem 1.5rem 6rem;
}

.lecture-post {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--paper-raised);
  margin-bottom: 1.1rem;
  box-shadow: var(--shadow-card);
  overflow: hidden;
  scroll-margin-top: 5rem; /* clears the sticky HUD when scrolled/deep-linked to */
}

.lecture-header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 1.1rem;
  width: 100%;
  padding: 1.15rem 1.35rem;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  font: inherit;
  color: inherit;
}

.lecture-header:hover { background: var(--maroon-wash); }

.lecture-number {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--maroon);
  border: 1px solid var(--rule-strong);
  border-radius: 2px;
  padding: 0.2rem 0.5rem;
  white-space: nowrap;
}

.lecture-titleblock { min-width: 0; }

.lecture-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.18rem;
  margin: 0 0 0.2rem;
  color: var(--ink);

}

.lecture-meta {
  font-size: 0.85rem;
  color: var(--ink-faint);

  gap: 0.6em;
  align-items: baseline;
}

.lecture-summary {
  font-size: 0.88rem;
  color: var(--ink-soft);
  margin-top: 0.35rem;

  -webkit-box-orient: vertical;
  overflow: hidden;

.lecture-post.expanded .lecture-summary { display: none; }

.lecture-chevron {

}

.lecture-post.expanded .lecture-chevron { transform: rotate(180deg); color: var(--maroon); }

.lecture-body {

.lecture-post.expanded .lecture-body { grid-template-rows: 1fr; }

.lecture-body-inner { overflow: hidden; }

.lecture-content {

.lecture-content > *:first-child { margin-top: 1.15rem; }

.lecture-content p { margin: 0 0 1rem; color: var(--ink); }

  font-family: var(--font-mono);

}
.lecture-content ul, .lecture-content ol { padding-left: 1.3rem; margin: 0 0 1rem; }
.lecture-content li { margin-bottom: 0.45rem; }

<script>
'use strict';

/* ============================================================================
   CONFIG
   ============================================================================ */

// Set true ONLY when hosting as a real static site (see README above).
// Must stay false inside a Claude.ai artifact — the sandbox throws on any
// localStorage access.
const USE_LOCAL_STORAGE = false;


/* ============================================================================
   STORAGE LAYER
   Swappable persistence, used only for accordion open/closed state.
   ============================================================================ */

class MemoryStorage {
  constructor() { this._data = new Map(); }
  get(key) { return this._data.has(key) ? this._data.get(key) : null; }
  set(key, value) { this._data.set(key, value); return true; }
}

class LocalStorageAdapter {
  constructor(prefix = 'io-lecture-site:') { this._prefix = prefix; }
  get(key) {
    try {
      const raw = window.localStorage.getItem(this._prefix + key);
      return raw === null ? null : JSON.parse(raw);
    } catch (e) { console.warn('LocalStorageAdapter.get failed', e); return null; }
  }
  set(key, value) {
    try {
      window.localStorage.setItem(this._prefix + key, JSON.stringify(value));
      return true;
    } catch (e) { console.warn('LocalStorageAdapter.set failed', e); return false; }
  }
}

const storage = USE_LOCAL_STORAGE ? new LocalStorageAdapter() : new MemoryStorage();


/* ============================================================================
   SHARED UTILITIES
   Math, formatting, and SVG helpers used by all five simulators.
   ============================================================================ */

const Fmt = {
  price(v)  { return '$' + v.toFixed(2); },
  qty(v)    { return v.toFixed(2); },
  pct(v)    { return (v * 100).toFixed(1) + '%'; },
  num(v, d = 2) { return v.toFixed(d); },
};

const Econ = {
  // Linear demand P = a - b*Q. Quantity demanded at price p.
  qFromDemand(a, b, p) { return (a - p) / b; },
  // Linear supply P = c + d*Q. Quantity supplied at price p.
  qFromSupply(c, d, p) { return (p - c) / d; },

  // Competitive equilibrium for P = a - bQ vs P = c + dQ.
  equilibrium(a, b, c, d) {
    const q = Math.max(0, (a - c) / (b + d));
    return { q, p: a - b * q };
  },

  // On-curve surplus triangles (valid only when q lies on the relevant curve;
  // the supply-demand simulator uses general integrals instead, so its
  // welfare numbers stay correct under binding price controls).
  consumerSurplus(a, p, q) { return 0.5 * q * (a - p); },
  producerSurplus(c, p, q) { return 0.5 * q * (p - c); },

  // Monopoly with linear demand P = a - bQ and constant MC = c.
  monopolyOutcome(a, b, c) {
    const q = Math.max(0, (a - c) / (2 * b));
    return { q, p: a - b * q };
  },

  lernerIndex(p, mc) { return p > 0 ? (p - mc) / p : 0; },

  // Symmetric Cournot, n identical firms, P = a - bQ, MC = c.
  cournotEquilibrium(a, b, c, n) {
    const qEach = Math.max(0, (a - c) / (b * (n + 1)));
    const qTotal = n * qEach;
    const p = a - b * qTotal;
    return { qEach, qTotal, p, profitEach: (p - c) * qEach };
  },

  // Cournot best response: q_i given rivals' combined output.
  cournotBestResponse(a, b, c, qRivals) {
    return Math.max(0, (a - c - b * qRivals) / (2 * b));
  },

  // Bertrand, homogeneous good, identical constant MC: price = MC.
  bertrandEquilibrium(a, b, c) {
    return { p: c, qTotal: Math.max(0, (a - c) / b), profitEach: 0 };
  },
};

const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function svgText(content, attrs = {}) {
  const t = svgEl('text', attrs);
  t.textContent = content;
  return t;
}

// Chart color semantics — identical across every simulator.
const C = {
  demand: 'var(--slate)',
  supply: 'var(--umber)',   // also: cost curves, producer surplus, profit
  cs:     'var(--sage)',
  dwl:    'var(--red)',
  seg2:   'var(--maroon)',  // second demand segment / special series
  ink:    'var(--ink)',
  faint:  'var(--ink-faint)',
  ruleStrong: 'var(--rule-strong)',
};

const TXT = {
  tick:  'font-family:var(--font-mono);font-size:9.5px;fill:var(--ink-faint)',
  axis:  'font-family:var(--font-body);font-size:11.5px;fill:var(--ink-soft)',
  label: (color) => 'font-family:var(--font-body);font-size:11px;font-weight:600;fill:' + color,
  mono:  (color) => 'font-family:var(--font-mono);font-size:10.5px;font-weight:600;fill:' + (color || 'var(--ink)'),
};

let _chartSeq = 0;

// Reusable chart scaffold: gridlines, axes, ticks, titles, plus two groups:
// `plot` (clipped to the plot area — curves and shading can safely overrun)
// and `overlay` (unclipped — markers and text labels). Returns scales that
// convert data units to pixel units.
function buildChart({ width = 640, height = 380, xMax, yMax, xLabel, yLabel, margin }) {
  const m = margin || { top: 18, right: 24, bottom: 46, left: 62 };
  const plotW = width - m.left - m.right;
  const plotH = height - m.top - m.bottom;

  const svg = svgEl('svg', { viewBox: '0 0 ' + width + ' ' + height, role: 'img' });

  const clipId = 'plot-clip-' + (++_chartSeq);
  const defs = svgEl('defs');
  const clip = svgEl('clipPath', { id: clipId });
  clip.appendChild(svgEl('rect', { x: m.left, y: m.top, width: plotW, height: plotH }));
  defs.appendChild(clip);
  svg.appendChild(defs);

  const xScale = (v) => m.left + (v / xMax) * plotW;
  const yScale = (v) => m.top + plotH - (v / yMax) * plotH;

  const NX = 5, NY = 5;
  const grid = svgEl('g');
  for (let i = 0; i <= NX; i++) {
    const xv = (xMax / NX) * i;
    grid.appendChild(svgEl('line', {
      x1: xScale(xv), y1: m.top, x2: xScale(xv), y2: m.top + plotH,
      style: 'stroke:var(--rule);stroke-width:1',
    }));
  }
  for (let i = 0; i <= NY; i++) {
    const yv = (yMax / NY) * i;
    grid.appendChild(svgEl('line', {
      x1: m.left, y1: yScale(yv), x2: m.left + plotW, y2: yScale(yv),
      style: 'stroke:var(--rule);stroke-width:1',
    }));
  }
  svg.appendChild(grid);

  const axes = svgEl('g');
  axes.appendChild(svgEl('line', {
    x1: m.left, y1: m.top + plotH, x2: m.left + plotW, y2: m.top + plotH,
    style: 'stroke:var(--ink-faint);stroke-width:1.3',
  }));
  axes.appendChild(svgEl('line', {
    x1: m.left, y1: m.top, x2: m.left, y2: m.top + plotH,
    style: 'stroke:var(--ink-faint);stroke-width:1.3',
  }));
  svg.appendChild(axes);

  const ticks = svgEl('g');
  for (let i = 0; i <= NX; i++) {
    const xv = (xMax / NX) * i;
    ticks.appendChild(svgText(String(Math.round(xv)), {
      x: xScale(xv), y: m.top + plotH + 16, 'text-anchor': 'middle', style: TXT.tick,
    }));
  }
  for (let i = 0; i <= NY; i++) {
    const yv = (yMax / NY) * i;
    ticks.appendChild(svgText(String(Math.round(yv)), {
      x: m.left - 8, y: yScale(yv) + 3, 'text-anchor': 'end', style: TXT.tick,
    }));
  }
  svg.appendChild(ticks);

  if (xLabel) {
    svg.appendChild(svgText(xLabel, {
      x: m.left + plotW / 2, y: height - 6, 'text-anchor': 'middle', style: TXT.axis,
    }));
  }
  if (yLabel) {
    svg.appendChild(svgText(yLabel, {
      x: 14, y: m.top + plotH / 2, 'text-anchor': 'middle', style: TXT.axis,
      transform: 'rotate(-90 14 ' + (m.top + plotH / 2) + ')',
    }));
  }

  const plot = svgEl('g', { 'clip-path': 'url(#' + clipId + ')' });
  svg.appendChild(plot);
  const overlay = svgEl('g');
  svg.appendChild(overlay);

  return { svg, plot, overlay, xScale, yScale, width, height, margin: m, plotW, plotH };
}

function linePath(points) {
  return points.map((p, i) => (i === 0 ? 'M ' : 'L ') + p[0] + ' ' + p[1]).join(' ');
}

function polygonPoints(points) {
  return points.map(p => p[0] + ',' + p[1]).join(' ');
}

function strokeLine(x1, y1, x2, y2, color, w, dash) {
  return svgEl('line', {
    x1, y1, x2, y2,
    style: 'stroke:' + color + ';stroke-width:' + w + (dash ? ';stroke-dasharray:' + dash : '') + ';fill:none',
  });
}

function shade(points, color, opacity) {
  return svgEl('polygon', { points: polygonPoints(points), style: 'fill:' + color + ';opacity:' + opacity });
}

function marker(cx, cy, color, r = 4) {
  return svgEl('circle', { cx, cy, r, style: 'fill:' + (color || 'var(--ink)') });
}

function buildReadoutCard({ label, value, accent }) {
  const div = document.createElement('div');
  div.className = 'readout-card';
  div.innerHTML =
    '<div class="readout-label">' + label + '</div>' +
    '<div class="readout-value' + (accent ? ' accent-' + accent : '') + '">' + value + '</div>';
  return div;
}

function buildLegend(items) {
  // items: [{ type: 'line'|'swatch', color, label }]
  const el = document.createElement('div');
  el.className = 'sim-legend';
  el.innerHTML = items.map(it =>
    '<span class="sim-legend-item">' +
      '<span class="sim-legend-' + it.type + '" style="background:' + it.color + ';"></span>' +
      it.label +
    '</span>'
  ).join('');
  return el;
}


/* ============================================================================
   LECTURE DATA — EDIT THIS ARRAY
   Add new lecture posts here. See README at the top of this file for the
   object shape and the one-line simulator embed syntax.
   ============================================================================ */

const LECTURES = [
  {
    id: 'lec1',
    number: 1,
    title: 'Introduction to Industrial Organization',
    date: '2026-07-20',
    summary: 'What is industrial organization?',
    bodyHTML: `
      <p>A definition of industrial organization is a bit touchy for me.</p>
      
      <p>And it might be worth explaining why through some history of economic thought.</p>
      
      <p>The classical and neoclassical economists were interested in the workings of the price 
      system and its effect on resource allocation in a private-ownership economy with extreme interdependence 
      and decentralization.</p>
      
      <p>And so how does one go about describing the operations of the price system? The answer 
      to this question culminated in the development of perfect competition. It should not be 
      trivialized how important this development was.</p>
      
      <p>It is an intellectual masterpiece and what made economics more thoroughly a science, 
      together with its twin achievement, marginal utility theory which was introduced following 
      the marginalist-subjectivist revolution from the neoclassicalists.</p>
      
      <p>What makes this problem so worthy to answer? Assume two different situations:</p>
      
      <p>(1) Suppose you are stranded on an island with nobody but yourself and its resources. 
      The maximization problem is straightforward because you are the only one with plans about 
      how and where to employ resources.</p>

      <p>(2) Imagine an economy with extreme interdependence and decentralization of private 
      resource-owners. There is an interesting element present here that is absent from the island:
      conflicts of interest and mutually beneficial exchange.</p>

      <p>The maximization problem is not so straightforward anymore.</p>




      
    

      <p>This course is organized around a single recurring question: <strong>relative
      to the competitive benchmark, does a given market structure produce more
      output, less output, or the same output — and who captures the resulting
      surplus?</strong> Every model we build for the rest of the term is, in one
      way or another, an answer to that question under a different set of
      assumptions about the number of firms, the nature of competition
      (price vs. quantity), the information firms have about their customers,
      and the strategic interdependence between competitors.</p>

      <h4>The three pillars of the field</h4>
      <p>We will organize the term around three broad questions, corresponding
      roughly to the three parts of the classic <em>structure–conduct–performance</em>
      paradigm:</p>
      <ul>
        <li><strong>Market structure.</strong> How many firms are there, how
        differentiated is the product, and how costly is entry? This is
        the subject of Lectures 2–3, where we study the extremes: perfect
        competition and monopoly.</li>
        <li><strong>Firm conduct.</strong> Given a structure, how do firms
        actually set prices and quantities, and how do they respond to
        rivals? This occupies the middle of the course: price discrimination
        (Lecture 4), and quantity vs. price competition under oligopoly
        (Lecture 5).</li>
        <li><strong>Strategic foundations.</strong> Why do firms choose the
        conduct they choose? Game theory (Lecture 6) gives us the formal
        machinery — best responses and Nash equilibrium — that underlies
        every oligopoly model we build.</li>
      </ul>

      <h4>The competitive benchmark, live</h4>
      <p>Rather than just asserting what happens in a competitive market, let's
      build it and poke at it. The simulator below implements the standard
      linear supply-and-demand model: a downward-sloping demand curve
      <code>P = a − bQ</code> and an upward-sloping supply curve
      <code>P = c + dQ</code>. The equilibrium price and quantity are wherever
      these two curves cross — the point at which the marginal buyer's
      willingness to pay exactly equals the marginal seller's cost.</p>

      <div data-sim="supply-demand"
           data-caption="Competitive equilibrium with adjustable demand/supply shifters, a per-unit tax, and price controls"></div>

      <p>Three exercises to try directly in the figure above, each of which
      previews a theme we'll return to later in the course:</p>
      <ul>
        <li><strong>Shift demand or supply</strong> and watch consumer surplus
        (sage) and producer surplus (umber) reallocate. Nothing here should
        surprise you from principles — but notice that the <em>total</em>
        surplus (CS + PS) is always maximized at the unregulated, untaxed
        equilibrium. That "no deadweight loss" result is the thing every
        later model in this course will fail to replicate in some way, and
        the whole point of IO is characterizing exactly how and why it fails.</li>
        <li><strong>Turn on a per-unit tax.</strong> A wedge appears between
        what buyers pay and what sellers receive, quantity falls below the
        efficient level, and a red deadweight-loss triangle appears. This is
        your first worked example of a "wedge" between price and marginal
        cost — precisely the same shape of triangle we will see again in
        Lecture 3 when monopoly creates its own wedge, not through a tax but
        through market power.</li>
        <li><strong>Impose a price ceiling</strong> below the equilibrium
        price (or a price floor above it). Quantity falls to the "short
        side" of the market, a shortage or surplus opens up, and deadweight
        loss reappears — this time from a quantity restriction rather than a
        price wedge. Compare the size and shape of this DWL triangle to the
        tax case: same underlying logic, different policy instrument.</li>
      </ul>

      <h4>Looking ahead</h4>
      <p>Every subsequent lecture will modify exactly one assumption of this
      benchmark model — a single seller instead of many (Lecture 3), a seller
      who can charge different prices to different buyers (Lecture 4), a
      small number of interacting sellers (Lecture 5) — and ask what happens
      to price, quantity, and the split of surplus. Keep this figure's demand
      curve, its surplus triangles, and its deadweight-loss wedge in mind:
      they are the yardstick against which every market structure in this
      course will be measured.</p>
    `
  },
];

function lecturesSorted() {
  return [...LECTURES].sort((a, b) => b.number - a.number);
}

function formatLectureDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

// Generic alias — the function above predates problem sets but formats any
// plain YYYY-MM-DD string, so pset code reads for-purpose instead of
// borrowing something named after lectures.
const formatDate = formatLectureDate;

const CHEVRON_SVG =
  '<svg class="lecture-chevron" viewBox="0 0 20 20" fill="none" aria-hidden="true">' +
    '<path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
  '</svg>';

// Mounts every not-yet-mounted [data-sim] element inside a post's article —
// a lecture or a problem set, both pass an object with .id and .number.
// Runs lazily on first expand; each element mounts exactly once, so a
// simulator keeps its live state across collapse/re-expand. Figure numbers
// are assigned in document order within the post. figPrefix distinguishes
// problem-set figures ("Figure PS1.1") from lecture figures ("Figure 1.1").
function mountSimsIn(article, item, figPrefix = '') {
  const all = article.querySelectorAll('[data-sim]');
  let figNo = 0;
  all.forEach((node) => {
    figNo += 1;
    if (node.hasAttribute('data-sim-mounted')) return;
    node.setAttribute('data-sim-mounted', '1');
    node.classList.add('sim-frame');

    const name = node.dataset.sim;
    const mountFn = SIMS[name];
    if (typeof mountFn !== 'function') {
      console.warn('Unknown simulator "' + name + '" in "' + item.id + '"');
      node.innerHTML = '<p class="sim-error">Unknown simulator "' + name +
        '". Valid names: ' + Object.keys(SIMS).join(', ') + '.</p>';
      return;
    }

    let config = {};
    if (node.dataset.config) {
      try { config = JSON.parse(node.dataset.config); }
      catch (err) {
        console.warn('Bad data-config JSON on "' + name + '" in "' + item.id +
          '" — mounting with defaults.', err);
      }
    }

    mountFn(node, config);

    if (node.dataset.caption) {
      const cap = document.createElement('p');
      cap.className = 'sim-caption';
      cap.textContent = 'Figure ' + figPrefix + item.number + '.' + figNo + ' — ' + node.dataset.caption;
      node.appendChild(cap);
    }
  });
}

function setExpanded(lecture, expanded, { persist = true } = {}) {
  const article = document.getElementById('post-' + lecture.id);
  if (!article) return;
  const headerBtn = document.getElementById('header-' + lecture.id);
  article.classList.toggle('expanded', expanded);
  headerBtn.setAttribute('aria-expanded', String(expanded));
  if (expanded) mountSimsIn(article, lecture);
  if (persist) {
    const stored = storage.get('accordionState') || {};
    stored[lecture.id] = expanded;
    storage.set('accordionState', stored);
  }
}

function renderFeed() {
  const feedEl = document.getElementById('feed-lectures');
  const sorted = lecturesSorted();
  const mostRecentId = sorted.length ? sorted[0].id : null;
  const storedState = storage.get('accordionState') || {};

  feedEl.innerHTML = '';

  sorted.forEach((lecture) => {
    const hasStored = Object.prototype.hasOwnProperty.call(storedState, lecture.id);
    const isExpanded = hasStored ? !!storedState[lecture.id] : (lecture.id === mostRecentId);

    const article = document.createElement('article');
    article.className = 'lecture-post';
    article.id = 'post-' + lecture.id;

    article.innerHTML =
      '<button class="lecture-header" aria-expanded="false" aria-controls="body-' + lecture.id + '" id="header-' + lecture.id + '" data-hud-label="\u2116 ' + lecture.number + ' \u2014 ' + lecture.title + '">' +
        '<span class="lecture-number">\u2116 ' + lecture.number + '</span>' +
        '<span class="lecture-titleblock">' +
          '<span class="lecture-title">' + lecture.title + '</span>' +
          '<span class="lecture-meta"><span>' + formatLectureDate(lecture.date) + '</span></span>' +
          '<span class="lecture-summary">' + lecture.summary + '</span>' +
        '</span>' +
        CHEVRON_SVG +
      '</button>' +
      '<div class="lecture-body" id="body-' + lecture.id + '" role="region" aria-labelledby="header-' + lecture.id + '">' +

    feedEl.appendChild(article);

// Deep links: page.html#post-lec3 expands that post and scrolls to it.
// Returns true if the hash matched a lecture, so a shared router knows
// whether to try the problem-set pattern next.
function openFromHash() {
  const m = location.hash.match(/^#post-(.+)$/);
  if (!m) return false;
  const lecture = LECTURES.find(l => l.id === m[1]);
  if (!lecture) return false;
  activateTab('lectures', { persist: false });
  setExpanded(lecture, true);
  requestAnimationFrame(() => {
    const article = document.getElementById('post-' + lecture.id);
    if (article) article.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  return true;
}
